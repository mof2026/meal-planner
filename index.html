<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MEAL PLANNER</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MEAL PLANNER">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='36' fill='%23F4F2ED'/%3E%3Crect x='30' y='30' width='120' height='120' fill='none' stroke='%2342444B' stroke-width='2'/%3E%3Cline x1='30' y1='70' x2='150' y2='70' stroke='%23D6D2C8' stroke-width='1'/%3E%3Cline x1='30' y1='100' x2='150' y2='100' stroke='%23D6D2C8' stroke-width='1'/%3E%3Cline x1='30' y1='130' x2='150' y2='130' stroke='%23D6D2C8' stroke-width='1'/%3E%3C/svg%3E">
<style>
:root {
  /* Notebook palette D — 藍染手帳 */
  --canvas: #C6C2BA;         /* desk / outer */
  --bg: #F4F2ED;             /* page */
  --surface: #EAE6DE;        /* hover / subtle fill */
  --line: #D6D2C8;           /* page divider */
  --border: #42444B;         /* notebook frame */
  --text: #2B2D33;
  --text-mid: #6A6C72;
  --text-light: #9A9B9F;
  --text-faint: #B8B9BC;
  --text-ghost: #AAABAE;
  --accent: #2B2D33;
  --font: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  font-weight: 300;
  color: var(--text);
  background: var(--canvas);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom);
  min-height: 100vh;
}

/* Notebook page — bordered frame around the whole app */
.page {
  background: var(--bg);
  border: 1px solid var(--border);
  min-width: 560px; max-width: 820px; margin: 12px auto;
  position: relative;
  box-shadow: 0 1px 0 rgba(0,0,0,.02);
}
@media (min-width: 768px) {
  body { padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom); }
  .page { margin: 24px auto; }
}

/* ===== Header ===== */
.hd { padding: 24px 24px 16px; display: flex; justify-content: space-between; align-items: baseline; }
.hd h1 { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 300; color: var(--text-light); letter-spacing: .12em; }
.hd-a { display: flex; gap: 16px; }
.hd-a button { background: none; border: none; color: var(--text-mid); cursor: pointer; padding: 6px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; }
.hd-a button:hover, .hd-a button:active { color: var(--text); background: var(--surface); }
.hd-a button svg { display: block; }

/* ===== Panels ===== */
.pnl { display: none; padding: 16px 24px 20px; border-top: 1px solid var(--line); }
.pnl.open { display: block; }
.pnl-lb { font-size: 11px; font-weight: 300; color: var(--text-light); letter-spacing: .06em; margin-bottom: 10px; }
.pnl-x { float: right; background: none; border: none; color: var(--text-faint); font-size: 16px; cursor: pointer; }

/* Day rules */
.rg { display: grid; grid-template-columns: 28px 1fr; gap: 6px 12px; align-items: center; }
.rg .rl { font-size: 12px; color: var(--text-light); }
.rg select {
  font-family: var(--font); font-size: 13px; font-weight: 300; color: var(--text);
  background: transparent; border: none; border-bottom: 1px solid var(--line);
  border-radius: 0; padding: 4px 0; width: 100%; -webkit-appearance: none; appearance: none;
}
.rr {
  margin-top: 10px; font-family: var(--font); font-size: 11px; font-weight: 300;
  color: var(--text-faint); background: none; border: none; cursor: pointer;
  text-decoration: underline; text-underline-offset: 2px;
}

/* Breakfast patterns */
.bp-list { margin-bottom: 8px; }
.bp-item { display: grid; grid-template-columns: minmax(0, 2fr) minmax(0, 3fr) auto; align-items: center; gap: 8px; padding: 3px 0; border-bottom: 1px solid var(--line); }
.bp-item input {
  font-family: var(--font); font-size: 12px; font-weight: 300; color: var(--text);
  border: none; border-bottom: 1px solid transparent; outline: none;
  background: transparent; padding: 2px 0; min-width: 0;
}
.bp-item input:focus { border-bottom-color: var(--line); }
.bp-item .bp-ing { font-size: 10px; color: var(--text-mid); }
.bp-item button { background: none; border: none; color: var(--text-faint); font-size: 12px; cursor: pointer; padding: 0; }
.bp-add { display: flex; gap: 6px; align-items: center; }
.bp-add input {
  font-family: var(--font); font-size: 12px; font-weight: 300; color: var(--text);
  border: none; border-bottom: 1px solid var(--line); outline: none;
  background: transparent; padding: 2px 0; min-width: 0;
}
.bp-add button { font-family: var(--font); font-size: 11px; color: var(--text-light); background: none; border: none; cursor: pointer; }

/* CSV */
.csv-d { border-bottom: 1px dashed var(--line); padding: 16px 0; text-align: center; color: var(--text-light); font-size: 12px; cursor: pointer; }
.csv-d input { display: none; }
.csv-s { margin-top: 6px; font-size: 11px; color: var(--text-light); }

/* Priority */
.pri { padding: 10px 24px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.pri-lb { font-size: 11px; color: var(--text-faint); white-space: nowrap; }
.pri-tag { font-size: 12px; color: var(--text); border-bottom: 1px solid var(--line); padding: 1px 2px; display: inline-flex; align-items: center; gap: 4px; }
.pri-tag button { background: none; border: none; color: var(--text-faint); font-size: 12px; cursor: pointer; padding: 0; }
.pri input {
  font-family: var(--font); font-size: 12px; font-weight: 300; color: var(--text);
  border: none; border-bottom: 1px solid var(--line); outline: none;
  background: transparent; width: 100px; padding: 2px 0;
}
.pri input::placeholder { color: var(--text-faint); }

/* Action bar */
.ab { padding: 10px 24px; display: flex; gap: 14px; align-items: center; border-top: 1px solid var(--line); flex-wrap: wrap; }
.ab button { font-family: var(--font); font-size: 12px; font-weight: 300; color: var(--text-mid); background: none; border: none; cursor: pointer; padding: 4px 0; }
.ab button:active { color: var(--text); }
.ab .ab-primary { color: var(--accent); font-weight: 400; }

/* ===== Timeline ===== */
.tl { padding: 0 24px 120px; }
.tl-empty { padding: 48px 0; text-align: center; color: var(--text-faint); font-size: 13px; }

/* Day row: left 75% dinner, right 25% breakfast */
.day-row { display: grid; grid-template-columns: 1fr 25%; border-top: 1px solid var(--line); min-height: 52px; }
.day-row:last-child { border-bottom: 1px solid var(--line); }

/* Past rows are faded automatically. */
.day-row.past .day-left,
.day-row.past .day-bf { color: var(--text-ghost); }
.day-row.past .day-main { color: var(--text-ghost); font-weight: 300; }
.day-row.past .day-sides { color: var(--text-faint); }
.day-row.past .day-name { color: var(--text-faint); }
.day-row.past .day-cat { color: var(--text-faint); }
.day-row.past .ing-content { color: var(--text-faint); }
.day-row.past .ing-toggle summary { color: var(--text-faint); }
.day-row.past .ing-ref { color: var(--text-faint); }

/* Skipped row */
.day-row.skipped .day-main { color: var(--text-faint); font-style: italic; }
.day-row.skipped .day-actions { opacity: 1 !important; }

/* Locked row */
.day-row.locked .day-name::after { content: ' ◎'; font-size: 9px; color: var(--text-light); }

/* Left: dinner */
.day-left { padding: 10px 12px 8px 0; border-right: 1px solid var(--line); }
.day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1px; }
.day-title { display: inline-flex; align-items: center; gap: 8px; min-width: 0; }
.day-name { font-size: 11px; font-weight: 400; color: var(--text-mid); letter-spacing: .08em; }
.day-date { font-size: 10px; color: var(--text-mid); margin-right: 5px; font-weight: 400; }
.day-cat { font-size: 10px; font-weight: 300; color: var(--text-faint); }
.day-cat-picker { position: relative; display: inline-flex; align-items: center; cursor: pointer; min-height: 22px; padding-left: 8px; }
.day-cat-picker .day-cat.overridden { color: var(--text-mid); border-bottom: 1px solid var(--line); }
.day-rule-select {
  position: absolute; inset: 0; width: 100%; height: 100%;
  opacity: 0; cursor: pointer; font-size: 16px;
}
.day-main { font-size: 15px; font-weight: 400; color: var(--text); line-height: 1.5; padding: 1px 0; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.day-main-text { flex: 1; min-width: 8em; }
.day-sides { font-size: 12px; font-weight: 300; color: var(--text-mid); line-height: 1.6; }
.slot-list { margin-top: 3px; display: grid; gap: 2px; }
.slot-row { display: grid; grid-template-columns: 48px minmax(0, 1fr) auto; align-items: center; gap: 6px; min-height: 25px; }
.slot-label { font-size: 10px; color: var(--text-light); white-space: nowrap; }
.slot-name { font-size: 13px; color: var(--text-mid); overflow-wrap: anywhere; }
.slot-row.main .slot-name { font-size: 15px; font-weight: 400; color: var(--text); }
.slot-actions { display: inline-flex; align-items: center; gap: 2px; }
.slot-row.locked .slot-label::after { content: ' ◎'; font-size: 9px; color: var(--text-light); }

/* Inline action buttons next to menu name */
.day-inline-actions {
  display: inline-flex; align-items: center; gap: 2px;
  flex-shrink: 0; margin-left: auto;
}
.day-btn {
  background: none; border: none;
  font-family: var(--font); font-size: 11px; font-weight: 300;
  color: var(--text-mid); cursor: pointer;
  padding: 7px 9px; border-radius: 14px;
  letter-spacing: .02em;
  line-height: 1;
  white-space: nowrap;
  transition: background .12s, color .12s;
}
.day-btn:active { color: var(--text); background: var(--surface); }
@media (hover: hover) {
  .day-btn:hover { color: var(--text); background: var(--surface); }
}

/* Primary redraw — thin SVG icon */
.day-btn.redraw {
  color: var(--text-mid);
  padding: 4px 8px;
  line-height: 0;
}
.day-title .day-btn.redraw { padding: 3px 4px; }
.day-btn.redraw svg { display: block; width: 22px; height: 22px; }
.day-btn.redraw:active,
.day-btn.redraw:hover { color: var(--text); background: var(--surface); }

/* Destructive — slightly faded */
.day-btn.danger { color: var(--text-faint); }

/* Legacy day-actions row (used on skipped rows) */
.day-actions { display: flex; gap: 2px; margin-top: 2px; flex-wrap: wrap; margin-left: -9px; }
.day-actions button {
  background: none; border: none;
  font-family: var(--font); font-size: 11px; font-weight: 300;
  color: var(--text-mid); cursor: pointer;
  padding: 7px 9px; border-radius: 14px; letter-spacing: .02em; line-height: 1;
}
.day-actions button:active { color: var(--text); background: var(--surface); }
@media (hover: hover) {
  .day-actions button:hover { color: var(--text); background: var(--surface); }
}

/* Ingredients detail */
.ing-toggle { margin-top: 4px; }
.ing-toggle summary { font-size: 11px; color: var(--text-light); cursor: pointer; list-style: none; }
.ing-toggle summary::before { content: '▸ '; font-size: 9px; }
.ing-toggle[open] summary::before { content: '▾ '; }
.ing-content { font-size: 12px; color: var(--text-mid); padding: 4px 0; white-space: pre-wrap; line-height: 1.7; }
.ing-ref { font-size: 10px; color: var(--text-light); margin-top: 2px; }

/* Edit area */
.day-edit { display: none; margin-top: 4px; }
.day-edit textarea {
  font-family: var(--font); font-size: 14px; font-weight: 300; color: var(--text);
  border: none; border-bottom: 1px solid var(--line); outline: none;
  background: transparent; width: 100%; min-height: 56px; resize: none; padding: 4px 0; line-height: 1.6;
}
.day-edit-actions { display: flex; gap: 14px; margin-top: 4px; }
.day-edit-actions button {
  font-family: var(--font); font-size: 11px; font-weight: 300;
  background: none; border: none; cursor: pointer; padding: 0; color: var(--text-light);
}
.day-edit-actions .save-btn { color: var(--text); }

/* Right: breakfast */
.day-bf { padding: 10px 0 8px 10px; font-size: 12px; color: var(--text-mid); display: flex; flex-direction: column; position: relative; }
.day-bf-label { font-size: 9px; color: var(--text-faint); letter-spacing: .04em; margin-bottom: 2px; }
.day-bf select {
  position: absolute; inset: 0; width: 100%; height: 100%;
  opacity: 0; cursor: pointer;
  font-family: var(--font); font-size: 16px; /* 16px: iOS Safari zoom防止（透明でも有効） */
  background: transparent; border: none; -webkit-appearance: none; appearance: none;
  padding: 0; outline: none;
}
.day-bf-text { font-size: 12px; color: var(--text-mid); white-space: pre; line-height: 1.5; }
.day-row.past .day-bf-text { color: var(--text-faint); }

/* Modal */
.overlay { display: none; position: fixed; inset: 0; background: rgba(90,85,78,.2); z-index: 100; }
.overlay.open { display: flex; align-items: flex-end; }
.modal {
  background: var(--bg); width: 100%; max-height: 85vh;
  border-radius: 12px 12px 0 0; overflow-y: auto; padding: 24px; -webkit-overflow-scrolling: touch;
}
.modal-title { font-size: 13px; font-weight: 300; color: var(--text-light); letter-spacing: .06em; margin-bottom: 16px; }
.modal-close { float: right; background: none; border: none; font-size: 16px; color: var(--text-faint); cursor: pointer; }
.shop-day { border-top: 1px solid var(--line); padding: 10px 0; }
.shop-day h3 { font-size: 11px; font-weight: 300; color: var(--text-faint); margin-bottom: 4px; letter-spacing: .06em; }
.shop-day pre { font-family: var(--font); font-size: 12px; font-weight: 300; color: var(--text); white-space: pre-wrap; line-height: 1.7; }

@media (min-width: 768px) {
  .modal { max-width: 560px; margin: 0 auto; border-radius: 12px; }
  .overlay.open { align-items: center; justify-content: center; }

  /* Wide screen: larger text for tablet readability */
  .hd h1 { font-size: 15px; }
  .hd-a button { font-size: 18px; }
  .pnl-lb { font-size: 13px; }
  .rg .rl { font-size: 14px; }
  .rg select { font-size: 15px; }
  .bp-item input { font-size: 14px; }
  .bp-item .bp-ing { font-size: 12px; }
  .bp-add input { font-size: 14px; }
  .csv-d { font-size: 14px; }
  .pri-lb { font-size: 13px; }
  .pri-tag { font-size: 14px; }
  .pri input { font-size: 14px; }
  .ab button { font-size: 14px; }
  .tl-empty { font-size: 15px; }
  .day-name { font-size: 13px; }
  .day-date { font-size: 12px; }
  .day-cat { font-size: 12px; }
  .day-main { font-size: 18px; }
  .day-sides { font-size: 14px; }
  .slot-label { font-size: 12px; }
  .slot-name { font-size: 15px; }
  .slot-row.main .slot-name { font-size: 18px; }
  .day-actions button { font-size: 12px; }
  .ing-toggle summary { font-size: 13px; }
  .ing-content { font-size: 14px; }
  .ing-ref { font-size: 12px; }
  .day-edit textarea { font-size: 16px; }
  .day-bf { font-size: 14px; }
  .day-bf-label { font-size: 11px; }
  .day-bf select { font-size: 16px; /* 透明だがiOS zoom防止のため維持 */ }
  .day-bf-text { font-size: 14px; }
  .shop-day h3 { font-size: 13px; }
  .shop-day pre { font-size: 14px; }
}
</style>
</head>
<body>



<div class="page">
<div class="hd">
  <h1>MEAL PLANNER</h1>
  <div class="hd-a">
    <button onclick="togglePanel('panel-import')" title="インポート" aria-label="インポート">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v13"></path><path d="M6 11l6 6 6-6"></path><path d="M5 20h14"></path></svg>
    </button>
    <button onclick="togglePanel('panel-settings')" title="設定" aria-label="設定">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
  </div>
</div>

<div id="panel-settings" class="pnl">
  <button class="pnl-x" onclick="togglePanel('panel-settings')">✕</button>
  <div class="pnl-lb">曜日ルール</div>
  <div class="rg" id="rules-grid"></div>
  <button class="rr" onclick="resetRules()">デフォルトに戻す</button>
  <div style="margin-top:20px">
    <div class="pnl-lb">朝食パターン</div>
    <div class="bp-list" id="bp-list"></div>
    <div class="bp-add">
      <input type="text" id="bp-name-input" placeholder="メニュー名…" style="flex:2">
      <input type="text" id="bp-ing-input" placeholder="材料（任意）…" style="flex:3">
      <button onclick="addBreakfastPattern()">追加</button>
    </div>
  </div>
  <div style="margin-top:20px">
    <div class="pnl-lb">設定データ（朝食パターン・曜日ルール・優先食材）</div>
    <div style="display:flex;gap:12px;margin-top:8px">
      <button class="rr" style="margin:0" onclick="exportSettings()">書き出し</button>
      <button class="rr" style="margin:0" onclick="document.getElementById('settings-file').click()">読み込み</button>
      <input type="file" id="settings-file" accept=".json" style="display:none">
    </div>
  </div>
</div>

<div id="panel-import" class="pnl">
  <button class="pnl-x" onclick="togglePanel('panel-import')">✕</button>
  <div class="pnl-lb">CSVインポート</div>
  <div class="csv-d" id="csv-drop" onclick="document.getElementById('csv-file').click()">
    タップしてCSVを選択
    <input type="file" id="csv-file" accept=".csv">
  </div>
  <div class="csv-s" id="csv-status"></div>
  <div style="margin-top:20px">
    <div class="pnl-lb">保存した献立</div>
    <div style="display:flex;gap:12px;margin-top:8px">
      <button class="rr" style="margin:0" onclick="document.getElementById('plan-file').click()">読み込み</button>
      <input type="file" id="plan-file" accept=".json" style="display:none">
    </div>
  </div>
</div>

<div class="pri">
  <span class="pri-lb">使い切り食材</span>
  <span id="priority-tags"></span>
  <input type="text" id="priority-input" placeholder="入力…" onkeydown="handlePriorityKey(event)">
</div>

<div class="ab">
  <button class="ab-primary" onclick="addDays(7)">＋7日分追加</button>
  <button class="ab-primary" onclick="addDays(1)">＋1日</button>
  <button onclick="lotteryDrafts()">抽選</button>
  <button onclick="exportMealPlan()">献立保存</button>
  <button onclick="openShoppingList()">買い物リスト</button>
  <button onclick="resetAll()">リセット</button>
</div>

<div class="tl" id="timeline"></div>
</div>

<div class="overlay" id="shop-overlay" onclick="closeShoppingList(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeShoppingList()">✕</button>
    <div class="modal-title">買い物リスト</div>
    <div id="shop-body"></div>
  </div>
</div>

<script>
'use strict';

/* ============================================================
   VERSION — keep localStorage and migrate schemas in place
   ============================================================ */

const APP_VERSION = '8';
if (localStorage.getItem('mp_version') !== APP_VERSION) {
  localStorage.setItem('mp_version', APP_VERSION);
}

/* ============================================================
   DATA LAYER
   ============================================================ */

const Storage = {
  get(key) {
    try {
      const raw = localStorage.getItem('mp_' + key);
      return raw ? JSON.parse(raw) : null;
    } catch { return null; }
  },
  _saveWarned: false,
  set(key, value) {
    try {
      localStorage.setItem('mp_' + key, JSON.stringify(value));
    } catch (e) {
      console.warn('localStorage save failed:', key, e);
      if (!this._saveWarned) {
        this._saveWarned = true;
        alert('データの保存に失敗しました。ストレージの容量が不足している可能性があります。');
      }
    }
  }
};

/**
 * Parse CSV text into array of objects.
 * Handles BOM, CRLF, quoted fields with escaped quotes.
 */
function parseCSV(text) {
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

  const rows = [];
  let pos = 0;
  const len = text.length;

  while (pos < len) {
    const row = [];
    while (pos < len) {
      let value = '';
      if (text[pos] === '"') {
        pos++;
        while (pos < len) {
          if (text[pos] === '"') {
            if (pos + 1 < len && text[pos + 1] === '"') {
              value += '"';
              pos += 2;
            } else {
              pos++;
              break;
            }
          } else {
            value += text[pos];
            pos++;
          }
        }
        if (pos < len && text[pos] === ',') { pos++; }
        else if (pos < len && text[pos] === '\n') { pos++; row.push(value); break; }
        else { row.push(value); break; }
      } else {
        const nextComma = text.indexOf(',', pos);
        const nextNewline = text.indexOf('\n', pos);
        const end = (nextComma === -1 && nextNewline === -1) ? len
          : (nextComma === -1) ? nextNewline
          : (nextNewline === -1) ? nextComma
          : Math.min(nextComma, nextNewline);
        value = text.substring(pos, end);
        pos = end;
        if (pos < len && text[pos] === ',') { pos++; }
        else if (pos < len && text[pos] === '\n') { pos++; row.push(value); break; }
        else { row.push(value); break; }
      }
      row.push(value);
    }
    if (row.length > 0 && !(row.length === 1 && row[0] === '')) {
      rows.push(row);
    }
  }

  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, j) => { obj[h] = (row[j] || '').trim(); });
    return obj;
  });
}

function stableHash(text) {
  let hash = 2166136261;
  for (let i = 0; i < text.length; i++) {
    hash ^= text.charCodeAt(i);
    hash = Math.imul(hash, 16777619);
  }
  return (hash >>> 0).toString(36);
}

function normalizeIdPart(text) {
  return String(text || '').trim().replace(/\s+/g, '-');
}

function makeRecipeId(row, fallbackIndex) {
  const manualKey = normalizeIdPart(row['手動キー']);
  if (manualKey) return 'manual:' + manualKey;
  const base = [
    row['名前'] || '',
    row['レシピ本'] || '',
    row['ページ'] || '',
    fallbackIndex
  ].join('|');
  return 'recipe:' + stableHash(base);
}

function isSoupName(text) {
  return /(スープ|みそ汁|味噌汁|汁|ポタージュ|お吸い物|すまし汁|酸辣湯)/.test(text || '');
}

function splitMealExample(rawText) {
  const text = String(rawText || '').replace(/[＊*].*$/, '');
  const parts = [];
  let current = '';
  let parenDepth = 0;

  function pushCurrent() {
    const cleaned = cleanMealPart(current);
    if (cleaned) parts.push(cleaned);
    current = '';
  }

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '(' || ch === '（') parenDepth++;
    if (ch === ')' || ch === '）') parenDepth = Math.max(0, parenDepth - 1);

    if (parenDepth === 0 && /[、,，／/]/.test(ch)) {
      pushCurrent();
      continue;
    }
    if (parenDepth === 0 && (ch === '　' || ch === '\n')) {
      pushCurrent();
      continue;
    }
    if (parenDepth === 0 && ch === ' ' && /[）)]/.test(text[i - 1] || '')) {
      pushCurrent();
      while (text[i + 1] === ' ') i++;
      continue;
    }
    if (parenDepth === 0 && ch === ' ' && text[i + 1] === ' ') {
      pushCurrent();
      while (text[i + 1] === ' ') i++;
      continue;
    }
    current += ch;
  }
  pushCurrent();
  return parts.flatMap(splitEmbeddedSoupPart);
}

function splitEmbeddedSoupPart(part) {
  if (!part || !isSoupName(part)) return part ? [part] : [];
  const soupStart = findEmbeddedSoupStart(part);
  if (soupStart <= 0) return [part];
  const before = cleanMealPart(part.slice(0, soupStart));
  const after = cleanMealPart(part.slice(soupStart));
  return [before, after].filter(Boolean);
}

function findEmbeddedSoupStart(text) {
  const soupWords = [
    'コンソメスープ',
    '中華スープ',
    '和風スープ',
    'コーンスープ',
    'ポタージュ',
    'みそ汁',
    '味噌汁',
    'お吸い物',
    'すまし汁',
    '酸辣湯',
    'スープ'
  ];
  let best = -1;
  soupWords.forEach(word => {
    const idx = text.indexOf(word);
    if (idx <= 0) return;
    const rawBefore = text.slice(0, idx);
    const before = rawBefore.trim();
    if (!/[）)]$/.test(before) && !/\s$/.test(rawBefore)) return;
    if (best === -1 || idx < best) best = idx;
  });
  return best;
}

function cleanMealPart(text) {
  return String(text || '')
    .replace(/[＊*].*$/, '')
    .replace(/^[\s、,，／/]+|[\s、,，／/]+$/g, '')
    .trim();
}

function isBalancedParens(text) {
  const open = (text.match(/[（(]/g) || []).length;
  const close = (text.match(/[）)]/g) || []).length;
  return open === close;
}

function isUsableMealPart(text) {
  if (!text) return false;
  if (!isBalancedParens(text)) return false;
  if (/^[）)]|[（(]$/.test(text)) return false;
  if (text.length <= 1) return false;
  return true;
}

function findRecipeIdByName(name, allRecipes) {
  if (!name) return null;
  const exact = allRecipes.find(r => r.name === name);
  if (exact) return exact.id;
  const loose = allRecipes.find(r => name.includes(r.name) || r.name.includes(name));
  return loose ? loose.id : null;
}

function createMealSetFromExample(recipe, exampleNo, rawText, allRecipes) {
  const parts = splitMealExample(rawText);
  const slots = { side1: null, side2: null, soup: null };
  parts.forEach(part => {
    if (!isUsableMealPart(part)) return;
    const slot = {
      name: part,
      recipeId: findRecipeIdByName(part, allRecipes),
      rawText: part
    };
    if (isSoupName(part)) {
      if (!slots.soup) slots.soup = slot;
    } else if (!slots.side1) {
      slots.side1 = slot;
    } else if (!slots.side2) {
      slots.side2 = slot;
    }
  });

  return {
    id: 'mealset:' + recipe.id + ':' + exampleNo + ':' + stableHash(rawText),
    sourceRecipeId: recipe.id,
    sourceExampleNo: exampleNo,
    rawText: rawText,
    main: { recipeId: recipe.id, name: recipe.name },
    slots: slots
  };
}

function buildCandidatesFromMealSets(allMealSets) {
  const sideCandidates = [];
  const soupCandidates = [];
  const seenSide = new Set();
  const seenSoup = new Set();

  allMealSets.forEach(ms => {
    ['side1', 'side2'].forEach(slotName => {
      const slot = ms.slots && ms.slots[slotName];
      if (!slot || !slot.name) return;
      if (!isUsableMealPart(slot.name)) return;
      const key = slot.name + '|' + (slot.recipeId || '');
      if (seenSide.has(key)) return;
      seenSide.add(key);
      sideCandidates.push({
        id: 'side:' + stableHash(key),
        name: slot.name,
        recipeId: slot.recipeId || null,
        rawText: slot.rawText || slot.name,
        sourceMealSetId: ms.id,
        sourceRecipeId: ms.sourceRecipeId
      });
    });
    const soup = ms.slots && ms.slots.soup;
    if (!soup || !soup.name) return;
    if (!isUsableMealPart(soup.name)) return;
    const key = soup.name + '|' + (soup.recipeId || '');
    if (seenSoup.has(key)) return;
    seenSoup.add(key);
    soupCandidates.push({
      id: 'soup:' + stableHash(key),
      name: soup.name,
      recipeId: soup.recipeId || null,
      rawText: soup.rawText || soup.name,
      sourceMealSetId: ms.id,
      sourceRecipeId: ms.sourceRecipeId
    });
  });

  return { sideCandidates, soupCandidates };
}

/** Convert parsed CSV rows to first-class recipe and virtual MealSet data. */
function csvToRecipes(parsed) {
  const rows = parsed.filter(row => (row['名前'] || '').trim());
  const recipes = rows.map((row, idx) => ({
    id: makeRecipeId(row, idx),
    name: row['名前'] || '',
    category: row['カテゴリ'] || '',
    tag: row['タグ'] || '',
    ingredients: row['主な材料'] || '',
    book: row['レシピ本'] || '',
    page: row['ページ'] || '',
    hotcookKey: row['ホットクックキー'] || '',
    manualKey: row['手動キー'] || ''
  }));

  const mealSets = [];
  rows.forEach((row, idx) => {
    const recipe = recipes[idx];
    [1, 2, 3, 4].forEach(no => {
      const rawText = (row['献立例' + no] || '').trim();
      if (!rawText) return;
      mealSets.push(createMealSetFromExample(recipe, no, rawText, recipes));
    });
  });

  const candidates = buildCandidatesFromMealSets(mealSets);
  return {
    recipes: recipes,
    mealSets: mealSets,
    sideCandidates: candidates.sideCandidates,
    soupCandidates: candidates.soupCandidates
  };
}

/* ----- Date helpers (local timezone safe) ----- */

function toLocalDate(isoString) {
  const parts = isoString.split('-').map(Number);
  return new Date(parts[0], parts[1] - 1, parts[2]);
}

function toISOString(date) {
  return date.getFullYear() + '-' +
    String(date.getMonth() + 1).padStart(2, '0') + '-' +
    String(date.getDate()).padStart(2, '0');
}

function todayISO() {
  return toISOString(new Date());
}

function addDaysToISO(isoString, numDays) {
  const d = toLocalDate(isoString);
  d.setDate(d.getDate() + numDays);
  return toISOString(d);
}

function getDayName(isoString) {
  return DAY_OF_WEEK[toLocalDate(isoString).getDay()];
}

function getDayNameEN(isoString) {
  return DAY_OF_WEEK_EN[toLocalDate(isoString).getDay()];
}

function formatDate(isoString) {
  const d = toLocalDate(isoString);
  return (d.getMonth() + 1) + '/' + d.getDate();
}

/* ----- Rule helpers ----- */

function getRules() {
  return Storage.get('rules') || { ...DEFAULT_RULES };
}

function normalizeRules(rawRules) {
  const normalized = { ...DEFAULT_RULES };
  if (!rawRules || typeof rawRules !== 'object' || Array.isArray(rawRules)) {
    return normalized;
  }
  Object.keys(DEFAULT_RULES).forEach(day => {
    if (isValidRule(rawRules[day])) {
      normalized[day] = {
        type: rawRules[day].type,
        value: rawRules[day].value
      };
    }
  });
  return normalized;
}

function getRuleForDay(dayName) {
  const rules = normalizeRules(Storage.get('rules'));
  return rules[dayName] || DEFAULT_RULES[dayName];
}

function isSameRule(a, b) {
  return !!a && !!b && a.type === b.type && a.value === b.value;
}

function isValidRule(rule) {
  return RULE_OPTIONS.some(opt => isSameRule(opt, rule));
}

function getRuleLabel(rule) {
  const opt = RULE_OPTIONS.find(o => isSameRule(o, rule));
  return opt ? opt.label : (rule ? rule.value : '');
}

function getEffectiveRule(entry) {
  const baseRule = getRuleForDay(getDayName(entry.date));
  return entry.ruleOverride && isValidRule(entry.ruleOverride)
    ? entry.ruleOverride
    : baseRule;
}

function isPrunableEntry(entry) {
  const cutoff = addDaysToISO(todayISO(), -28);
  return entry.date < cutoff;
}

function filterByRule(allRecipes, rule) {
  if (rule.type === 'tag') {
    return allRecipes.filter(r => r.tag.includes(rule.value));
  }
  return allRecipes.filter(r => r.category === rule.value && !r.tag.includes('休日夜'));
}

/* ----- Conflict detection ----- */

function extractKeyIngredients(text) {
  return KEY_INGREDIENTS.filter(k => text.includes(k));
}

function hasIngredientConflict(dinnerA, dinnerB) {
  const mainA = getDinnerMain(dinnerA);
  const mainB = getDinnerMain(dinnerB);
  if (!mainA || !mainB || !mainA.ingredients || !mainB.ingredients) return false;
  const keysA = extractKeyIngredients(mainA.ingredients);
  const keysB = extractKeyIngredients(mainB.ingredients);
  return keysA.some(a => keysB.some(b => a === b || a.includes(b) || b.includes(a)));
}

function expandPriorityTerms() {
  const terms = new Set(priorities);
  priorities.forEach(priority => {
    Object.values(INGREDIENT_GROUPS).forEach(group => {
      if (group.some(word => priority.includes(word) || word.includes(priority))) {
        group.forEach(word => terms.add(word));
      }
    });
  });
  return Array.from(terms).filter(Boolean);
}

function recipePriorityText(recipe) {
  const relatedMealSets = mealSets.filter(ms => String(ms.sourceRecipeId) === String(recipe.id));
  return [
    recipe.name,
    recipe.ingredients,
    relatedMealSets.map(ms => ms.rawText).join(' ')
  ].join(' ');
}

function priorityScore(recipe) {
  if (!priorities.length) return 0;
  const text = recipePriorityText(recipe);
  return expandPriorityTerms().reduce((score, term) => score + (text.includes(term) ? 1 : 0), 0);
}

function weightedPick(candidates) {
  if (!candidates.length) return null;
  const weighted = [];
  candidates.forEach(recipe => {
    weighted.push(recipe);
    const score = priorityScore(recipe);
    for (let i = 0; i < Math.min(score, 4); i++) weighted.push(recipe);
  });
  return weighted[Math.floor(Math.random() * weighted.length)];
}

/* ----- Lottery ----- */

function getRecentlyUsedNames() {
  const cutoff = addDaysToISO(todayISO(), -14);
  const names = [];
  for (const entry of entries) {
    const main = getDinnerMain(entry.dinner);
    if (main && main.name && entry.date >= cutoff) {
      names.push(main.name);
    }
  }
  return names;
}

function chooseMainRecipeForEntry(idx) {
  const entry = entries[idx];
  const rule = getEffectiveRule(entry);
  let candidates = filterByRule(recipes, rule);
  if (!candidates.length) return null;

  const usedNames = getRecentlyUsedNames();
  const fresh = candidates.filter(r => !usedNames.includes(r.name));
  if (fresh.length) candidates = fresh;

  const prevDinner = idx > 0 && entries[idx - 1].dinner
    ? entries[idx - 1].dinner : null;
  const nextDinner = idx < entries.length - 1 && entries[idx + 1].dinner
    ? entries[idx + 1].dinner : null;
  const noConflict = candidates.filter(r =>
    !hasIngredientConflict({ slots: { main: { ingredients: r.ingredients } }, schemaVersion: 2 }, prevDinner) &&
    !hasIngredientConflict({ slots: { main: { ingredients: r.ingredients } }, schemaVersion: 2 }, nextDinner)
  );
  if (noConflict.length) candidates = noConflict;

  if (priorities.length) {
    const prioritized = candidates.filter(r => priorityScore(r) > 0);
    if (prioritized.length && Math.random() < 0.72) {
      candidates = prioritized;
    }
  }

  return weightedPick(candidates);
}

function mealSetToDinner(recipe, mealSet, previousDinner) {
  const prev = normalizeDinner(previousDinner);
  const locks = prev ? { ...emptyDinnerLocks(), ...prev.locks } : emptyDinnerLocks();
  const slots = emptyDinnerSlots();

  slots.main = locks.main && prev && prev.slots.main ? prev.slots.main : makeSlotFromRecipe(recipe);
  if (mealSet) {
    ['side1', 'side2', 'soup'].forEach(slotName => {
      slots[slotName] = locks[slotName] && prev && prev.slots[slotName]
        ? prev.slots[slotName]
        : makeSlotFromCandidate(mealSet.slots[slotName]);
    });
  }
  if (!mealSet && prev) {
    ['side1', 'side2', 'soup'].forEach(slotName => {
      slots[slotName] = locks[slotName] ? prev.slots[slotName] : null;
    });
  }

  return {
    schemaVersion: 2,
    parseVersion: 3,
    origin: mealSet ? 'mealSet' : 'generated',
    mealSetId: mealSet ? mealSet.id : null,
    locks: locks,
    slots: slots,
    rawExample: mealSet ? mealSet.rawText : ''
  };
}

function drawForEntry(idx) {
  const previousDinner = normalizeDinner(entries[idx].dinner);
  let picked = null;
  if (previousDinner && previousDinner.locks.main && previousDinner.slots.main) {
    picked = findRecipeById(previousDinner.slots.main.recipeId) || {
      id: previousDinner.slots.main.recipeId,
      name: previousDinner.slots.main.name,
      ingredients: previousDinner.slots.main.ingredients || '',
      book: previousDinner.slots.main.book || '',
      page: previousDinner.slots.main.page || '',
      category: previousDinner.slots.main.category || ''
    };
  } else {
    picked = chooseMainRecipeForEntry(idx);
  }
  if (!picked) return previousDinner;

  const relatedMealSets = mealSets.filter(ms => String(ms.sourceRecipeId) === String(picked.id));
  const mealSet = relatedMealSets.length
    ? relatedMealSets[Math.floor(Math.random() * relatedMealSets.length)]
    : null;
  return mealSetToDinner(picked, mealSet, previousDinner);
}

/**
 * Escape string for safe use in both HTML content and attribute values.
 * Covers: & < > " '
 */
function escapeHTML(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function togglePanel(id) {
  document.getElementById(id).classList.toggle('open');
}

/* ----- State and migrations ----- */

function normalizeStoredRecipe(recipe, idx) {
  if (!recipe || typeof recipe !== 'object') return null;
  const name = typeof recipe.name === 'string' ? recipe.name.trim() : '';
  if (!name) return null;
  return {
    id: recipe.id != null ? String(recipe.id) : makeRecipeId({ '名前': name, 'レシピ本': recipe.book || '', 'ページ': recipe.page || '' }, idx),
    name: name,
    category: typeof recipe.category === 'string' ? recipe.category : '',
    tag: typeof recipe.tag === 'string' ? recipe.tag : '',
    ingredients: typeof recipe.ingredients === 'string' ? recipe.ingredients : '',
    book: typeof recipe.book === 'string' ? recipe.book : '',
    page: typeof recipe.page === 'string' ? recipe.page : '',
    hotcookKey: typeof recipe.hotcookKey === 'string' ? recipe.hotcookKey : '',
    manualKey: typeof recipe.manualKey === 'string' ? recipe.manualKey : '',
    sideOptions: Array.isArray(recipe.sideOptions) ? recipe.sideOptions.filter(Boolean) : []
  };
}

function normalizeStoredMealSet(mealSet) {
  if (!mealSet || typeof mealSet !== 'object' || !mealSet.rawText) return null;
  const slots = mealSet.slots && typeof mealSet.slots === 'object' ? mealSet.slots : {};
  return {
    id: String(mealSet.id || ('mealset:' + stableHash(mealSet.rawText))),
    sourceRecipeId: mealSet.sourceRecipeId != null ? String(mealSet.sourceRecipeId) : null,
    sourceExampleNo: Number(mealSet.sourceExampleNo) || 0,
    rawText: String(mealSet.rawText),
    main: mealSet.main || { recipeId: mealSet.sourceRecipeId || null, name: '' },
    slots: {
      side1: normalizeLooseSlot(slots.side1),
      side2: normalizeLooseSlot(slots.side2),
      soup: normalizeLooseSlot(slots.soup)
    }
  };
}

function normalizeLooseSlot(slot) {
  if (!slot) return null;
  if (typeof slot === 'string') return { name: slot, recipeId: null, rawText: slot };
  if (typeof slot !== 'object' || !slot.name) return null;
  return {
    name: String(slot.name),
    recipeId: slot.recipeId != null ? String(slot.recipeId) : null,
    rawText: String(slot.rawText || slot.name)
  };
}

function loadRecipeDataFromStorage() {
  const storedRecipes = (Storage.get('recs') || [])
    .map(normalizeStoredRecipe)
    .filter(Boolean);
  let storedMealSets = (Storage.get('mealSets') || [])
    .map(normalizeStoredMealSet)
    .filter(Boolean);

  if (!storedMealSets.length && storedRecipes.some(r => r.sideOptions && r.sideOptions.length)) {
    storedRecipes.forEach(recipe => {
      recipe.sideOptions.forEach((rawText, idx) => {
        storedMealSets.push(createMealSetFromExample(recipe, idx + 1, rawText, storedRecipes));
      });
    });
  } else if (storedMealSets.length) {
    storedMealSets = storedMealSets.map(mealSet => {
      const recipe = storedRecipes.find(r => String(r.id) === String(mealSet.sourceRecipeId));
      return recipe
        ? createMealSetFromExample(recipe, mealSet.sourceExampleNo || 1, mealSet.rawText, storedRecipes)
        : mealSet;
    });
  }

  storedRecipes.forEach(recipe => { delete recipe.sideOptions; });
  const candidates = buildCandidatesFromMealSets(storedMealSets);
  return {
    recipes: storedRecipes,
    mealSets: storedMealSets,
    sideCandidates: candidates.sideCandidates,
    soupCandidates: candidates.soupCandidates
  };
}

function saveRecipeData() {
  Storage.set('recs', recipes);
  Storage.set('mealSets', mealSets);
  Storage.set('sideCandidates', sideCandidates);
  Storage.set('soupCandidates', soupCandidates);
}

function emptyDinnerLocks() {
  return { main: false, side1: false, side2: false, soup: false };
}

function emptyDinnerSlots() {
  return { main: null, side1: null, side2: null, soup: null };
}

function makeSlotFromRecipe(recipe) {
  if (!recipe) return null;
  return {
    name: recipe.name,
    recipeId: recipe.id,
    ingredients: recipe.ingredients || '',
    book: recipe.book || '',
    page: recipe.page || '',
    category: recipe.category || ''
  };
}

function makeSlotFromCandidate(candidate) {
  if (!candidate || !candidate.name) return null;
  const recipe = candidate.recipeId ? findRecipeById(candidate.recipeId) : null;
  return {
    name: candidate.name,
    recipeId: candidate.recipeId || null,
    rawText: candidate.rawText || candidate.name,
    ingredients: recipe ? recipe.ingredients : '',
    book: recipe ? recipe.book : '',
    page: recipe ? recipe.page : '',
    category: recipe ? recipe.category : ''
  };
}

function findRecipeById(recipeId) {
  if (recipeId == null) return null;
  return recipes.find(r => String(r.id) === String(recipeId)) || null;
}

function isDinnerV2(dinner) {
  return !!dinner && dinner.schemaVersion === 2 && dinner.slots && typeof dinner.slots === 'object';
}

function normalizeDinner(dinner) {
  if (!dinner || typeof dinner !== 'object' || Array.isArray(dinner)) return null;
  if (isDinnerV2(dinner)) {
    const locks = { ...emptyDinnerLocks(), ...(dinner.locks || {}) };
    const slots = { ...emptyDinnerSlots() };
    ['main', 'side1', 'side2', 'soup'].forEach(slotName => {
      slots[slotName] = normalizeLooseSlot(dinner.slots[slotName]);
      if (slotName === 'main' && slots[slotName]) {
        const recipe = slots[slotName].recipeId ? findRecipeById(slots[slotName].recipeId) : null;
        slots[slotName] = {
          ...slots[slotName],
          ingredients: typeof dinner.slots[slotName].ingredients === 'string' ? dinner.slots[slotName].ingredients : (recipe ? recipe.ingredients : ''),
          book: typeof dinner.slots[slotName].book === 'string' ? dinner.slots[slotName].book : (recipe ? recipe.book : ''),
          page: typeof dinner.slots[slotName].page === 'string' ? dinner.slots[slotName].page : (recipe ? recipe.page : ''),
          category: typeof dinner.slots[slotName].category === 'string' ? dinner.slots[slotName].category : (recipe ? recipe.category : '')
        };
      }
    });
    const shouldReparseMealSet = dinner.origin === 'mealSet' &&
      dinner.parseVersion !== 3 &&
      typeof dinner.rawExample === 'string' &&
      dinner.rawExample &&
      slots.main &&
      slots.main.recipeId;
    if (shouldReparseMealSet) {
      const recipe = findRecipeById(slots.main.recipeId);
      if (recipe) {
        const reparsed = createMealSetFromExample(recipe, 1, dinner.rawExample, recipes);
        ['side1', 'side2', 'soup'].forEach(slotName => {
          if (!locks[slotName]) slots[slotName] = makeSlotFromCandidate(reparsed.slots[slotName]);
        });
      }
    }
    return {
      schemaVersion: 2,
      parseVersion: 3,
      origin: dinner.origin || 'manual',
      mealSetId: dinner.mealSetId || null,
      locks: locks,
      slots: slots,
      rawExample: typeof dinner.rawExample === 'string' ? dinner.rawExample : ''
    };
  }

  const name = typeof dinner.name === 'string' ? dinner.name.trim() : '';
  if (!name) return null;
  const recipe = recipes.find(r => r.name === name);
  const slots = emptyDinnerSlots();
  slots.main = recipe ? makeSlotFromRecipe(recipe) : {
    name: name,
    recipeId: null,
    ingredients: typeof dinner.ingredients === 'string' ? dinner.ingredients : '',
    book: typeof dinner.book === 'string' ? dinner.book : '',
    page: typeof dinner.page === 'string' ? dinner.page : '',
    category: typeof dinner.category === 'string' ? dinner.category : ''
  };
  const sides = typeof dinner.sides === 'string' ? dinner.sides.trim() : '';
  if (sides) {
    const parts = splitMealExample(sides);
    if (parts.length) {
      const first = parts[0];
      slots[isSoupName(first) ? 'soup' : 'side1'] = {
        name: first,
        recipeId: findRecipeIdByName(first, recipes),
        rawText: first
      };
    } else {
      slots.side1 = { name: sides, recipeId: null, rawText: sides };
    }
  }
  return {
    schemaVersion: 2,
    parseVersion: 3,
    origin: 'manual',
    mealSetId: null,
    locks: emptyDinnerLocks(),
    slots: slots,
    rawExample: sides
  };
}

function getDinnerMain(dinner) {
  return isDinnerV2(dinner) ? dinner.slots.main : dinner;
}

const recipeData = loadRecipeDataFromStorage();
let recipes = recipeData.recipes;
let mealSets = recipeData.mealSets;
let sideCandidates = recipeData.sideCandidates;
let soupCandidates = recipeData.soupCandidates;
let entries = Storage.get('entries') || [];
let priorities = Storage.get('prio') || [];
let breakfastPatterns = Storage.get('bpats') || [...DEFAULT_BREAKFAST_PATTERNS];

function saveEntries() { Storage.set('entries', entries); }

function pruneOldEntries() {
  const before = entries.length;
  entries = entries.filter(entry => !isPrunableEntry(entry));
  if (entries.length !== before) saveEntries();
}

function normalizeEntries() {
  let changed = false;
  entries.forEach(entry => {
    if (entry.status) {
      delete entry.status;
      changed = true;
    }
    if (entry.ruleOverride && !isValidRule(entry.ruleOverride)) {
      delete entry.ruleOverride;
      changed = true;
    }
    const normalizedDinner = normalizeDinner(entry.dinner);
    if (JSON.stringify(normalizedDinner) !== JSON.stringify(entry.dinner)) {
      entry.dinner = normalizedDinner;
      changed = true;
    }
  });
  pruneOldEntries();
  if (changed) saveEntries();
}

/* ----- Rules UI ----- */

function renderRules() {

  const rules = normalizeRules(Storage.get('rules'));
  grid.innerHTML = '';

  ['月', '火', '水', '木', '金', '土', '日'].forEach(day => {

      select.appendChild(option);
    });
    select.addEventListener('change', () => {

function renderBreakfastPatterns() {

    );
    div.appendChild(nameInput);

    ingInput.addEventListener('change', () =>
      updateBreakfastPattern(idx, 'ingredients', ingInput.value)
    );

    delBtn.textContent = '✕';
    delBtn.addEventListener('click', () => removeBreakfastPattern(idx));
    div.appendChild(delBtn);

    list.appendChild(div);

function updateBreakfastPattern(idx, field, value) {
  const pattern = breakfastPatterns[idx];
  if (!pattern) return;

  if (field === 'name') {
    const oldName = pattern.name;
    const nextName = value.trim();
    if (!nextName) {
      renderBreakfastPatterns();
      return;
    }
    pattern.name = nextName;
    if (oldName !== nextName) {
      entries.forEach(entry => {
        if (entry.breakfast === oldName) entry.breakfast = nextName;
      });
      saveEntries();
    }
  } else if (field === 'ingredients') {
    pattern.ingredients = value.trim();
  }

  Storage.set('bpats', breakfastPatterns);
  renderBreakfastPatterns();
  render();
}

function addBreakfastPattern() {
  const nameInput = document.getElementById('bp-name-input');
  const ingInput = document.getElementById('bp-ing-input');
  const name = nameInput.value.trim();
  if (!name) return;
  breakfastPatterns.push({ name: name, ingredients: ingInput.value.trim() });
  nameInput.value = '';
  ingInput.value = '';
  Storage.set('bpats', breakfastPatterns);
  renderBreakfastPatterns();
  render();
}

function removeBreakfastPattern(idx) {
  breakfastPatterns.splice(idx, 1);
  Storage.set('bpats', breakfastPatterns);
  renderBreakfastPatterns();
  render();
}

/* ----- Meal Plan Export / Import ----- */

function normalizeImportedDinner(dinner) {
  return normalizeDinner(dinner);
}

function normalizeImportedEntry(entry) {
  if (!entry || typeof entry !== 'object' || Array.isArray(entry)) return null;
  if (typeof entry.date !== 'string' || !/^\d{4}-\d{2}-\d{2}$/.test(entry.date)) return null;
  if (toISOString(toLocalDate(entry.date)) !== entry.date) return null;

  const normalized = {
    date: entry.date,
    dinner: normalizeImportedDinner(entry.dinner),
    breakfast: typeof entry.breakfast === 'string' && entry.breakfast ? entry.breakfast : null,
    skipped: entry.skipped === true
  };
  if (!normalized.skipped && entry.locked === true) normalized.locked = true;
  if (entry.ruleOverride && isValidRule(entry.ruleOverride)) {
    normalized.ruleOverride = {
      type: entry.ruleOverride.type,
      value: entry.ruleOverride.value
    };
  }
  return normalized;
}

function exportMealPlan() {
  pruneOldEntries();
  if (!entries.length) { alert('保存する献立がありません'); return; }
  const data = {
    _type: 'meal_planner_plan',

    entries: entries
  };

  const a = document.createElement('a');
  a.href = url;
  a.download = '献立_' + todayISO().replace(/-/g, '') + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

document.getElementById('plan-file').addEventListener('change', function(e) {
  if (!e.target.files.length) return;
  const file = e.target.files[0];
  if (file.size > 2 * 1024 * 1024) {
    alert('ファイルサイズが大きすぎます');
    e.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (data._type !== 'meal_planner_plan' || !Array.isArray(data.entries)) {
        alert('献立プランナーの献立ファイルではありません');
        return;
      }
      const importedEntries = data.entries
        .map(normalizeImportedEntry)
        .filter(Boolean)
        .filter(entry => !isPrunableEntry(entry))
        .sort((a, b) => a.date.localeCompare(b.date));
      if (!importedEntries.length) {
        alert('読み込める献立がありません（28日より古い行は除外されます）');
        return;
      }
      if (!confirm('現在の献立を、保存ファイルの ' + importedEntries.length + ' 行で上書きします。よろしいですか？')) return;

      entries = importedEntries;
      saveEntries();
      render();
      alert('献立を読み込みました');
    } catch (err) {
      alert('ファイルの読み込みに失敗しました');
    }
  };
  reader.readAsText(file, 'UTF-8');
  e.target.value = '';
});

function loadCSV(file) {
  if (file.size > 5 * 1024 * 1024) {
    alert('ファイルサイズが大きすぎます（上限5MB）');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    const data = csvToRecipes(parseCSV(e.target.result));
    recipes = data.recipes;
    mealSets = data.mealSets;
    sideCandidates = data.sideCandidates;
    soupCandidates = data.soupCandidates;
    saveRecipeData();
    const counts = {};
    recipes.forEach(r => { counts[r.category] = (counts[r.category] || 0) + 1; });
    const summary = Object.entries(counts)
      .map(([k, v]) => k + ' ' + v).join('　');
    document.getElementById('csv-status').textContent =
      recipes.length + '件 / MealSet ' + mealSets.length + '件（' + summary + '）';
    render();
  };
  reader.readAsText(file, 'UTF-8');
}

/* ----- Actions ----- */

function addDays(numDays) {
  if (!numDays) numDays = 7;
  if (!recipes.length) { alert('CSVをインポートしてください'); return; }
  const start = entries.length
    ? addDaysToISO(entries[entries.length - 1].date, 1)
    : todayISO();
  const defaultBF = breakfastPatterns.length ? breakfastPatterns[0].name : null;
  for (let i = 0; i < numDays; i++) {
    entries.push({
      date: addDaysToISO(start, i),
      dinner: null,
      breakfast: defaultBF,
      skipped: false
    });
  }
  saveEntries();
  render();
  setTimeout(() => {
    const tl = document.getElementById('timeline');
    if (tl.lastElementChild) {
      tl.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 100);
}

function lotteryDrafts() {
  if (!recipes.length) return;
  const targets = [];
  entries.forEach((entry, idx) => {
    if (entry.date >= todayISO() && !entry.skipped && !entry.locked) {
      const rule = getEffectiveRule(entry);
      const count = filterByRule(recipes, rule).length;
      targets.push({ idx, count });
    }
  });
  if (!targets.length) return;
  targets.sort((a, b) => a.count - b.count);
  for (const target of targets) {
    const result = drawForEntry(target.idx);
    if (result) entries[target.idx].dinner = result;
  }
  saveEntries();
  render();
}

function resetAll() {
  if (!entries.length) return;
  if (!confirm('献立をすべてクリアしますか？\n（レシピCSVと朝食パターンはそのまま残ります）')) return;
  entries = [];
  saveEntries();
  render();
}

function toggleSkip(idx) {

  saveEntries();

function toggleLock(idx) {

function setEntryRuleOverride(idx, value) {
  const entry = entries[idx];
  if (!entry) return;
  const baseRule = getRuleForDay(getDayName(entry.date));
  const nextRule = JSON.parse(value);
  if (isSameRule(nextRule, baseRule)) {

}

function redrawEntry(idx) {
  if (entries[idx].skipped) return;
  const result = drawForEntry(idx);
  if (result) entries[idx].dinner = result;
  saveEntries();
  render();
}

function pickRandom(list) {
  return list.length ? list[Math.floor(Math.random() * list.length)] : null;
}

function pickDifferentCandidate(list, currentSlot) {
  const currentName = currentSlot && currentSlot.name ? currentSlot.name : '';
  const filtered = list.filter(item => item && item.name && item.name !== currentName);
  return pickRandom(filtered.length ? filtered : list);
}

function redrawSlot(idx, slotName) {
  const entry = entries[idx];
  if (!entry || entry.skipped || entry.locked) return;
  const dinner = normalizeDinner(entry.dinner) || {
    schemaVersion: 2,
    parseVersion: 3,
    origin: 'manual',
    mealSetId: null,
    locks: emptyDinnerLocks(),
    slots: emptyDinnerSlots(),
    rawExample: ''
  };
  if (dinner.locks[slotName]) return;

  if (slotName === 'main') {
    entry.dinner = dinner;
    redrawEntry(idx);
    return;
  }

  if (slotName === 'side1' || slotName === 'side2') {
    const mainId = dinner.slots.main && dinner.slots.main.recipeId;
    let candidates = [];
    if (mainId) {
      mealSets
        .filter(ms => String(ms.sourceRecipeId) === String(mainId) && ms.id !== dinner.mealSetId)
        .forEach(ms => {
          ['side1', 'side2'].forEach(name => {
            if (ms.slots[name] && isUsableMealPart(ms.slots[name].name)) {
              candidates.push(ms.slots[name]);
            }
          });
        });
    }
    if (!candidates.length) candidates = sideCandidates;
    const picked = pickDifferentCandidate(candidates, dinner.slots[slotName]);
    if (picked) dinner.slots[slotName] = makeSlotFromCandidate(picked);
  } else if (slotName === 'soup') {
    const picked = pickDifferentCandidate(soupCandidates, dinner.slots.soup);
    if (picked) dinner.slots.soup = makeSlotFromCandidate(picked);
  }

  entry.dinner = dinner;
  saveEntries();
  render();
}

function toggleSlotLock(idx, slotName) {
  const entry = entries[idx];
  if (!entry || entry.skipped || !entry.dinner) return;
  const dinner = normalizeDinner(entry.dinner);
  if (!dinner) return;
  dinner.locks[slotName] = !dinner.locks[slotName];
  entry.dinner = dinner;
  saveEntries();
  render();
}

function clearDinner(idx) {
  entries[idx].dinner = null;
  saveEntries();
  render();
}

function toggleEditDinner(idx) {
  const el = document.getElementById('edit-' + idx);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function cancelEdit(idx) {
  document.getElementById('edit-' + idx).style.display = 'none';
}

function saveEdit(idx) {
  const textarea = document.getElementById('edit-ta-' + idx);
  const lines = textarea.value.split('\n').filter(l => l.trim());
  if (!lines.length) {
    entries[idx].dinner = null;
  } else {
    const existing = normalizeDinner(entries[idx].dinner);
    const mainName = lines[0].trim();
    const recipe = recipes.find(r => r.name === mainName);
    const dinner = {
      schemaVersion: 2,
      parseVersion: 3,
      origin: 'manual',
      mealSetId: null,
      locks: existing ? existing.locks : emptyDinnerLocks(),
      slots: emptyDinnerSlots(),
      rawExample: lines.slice(1).join('　')
    };
    dinner.slots.main = recipe ? makeSlotFromRecipe(recipe) : {
      name: mainName,
      recipeId: null,
      ingredients: existing && existing.slots.main ? existing.slots.main.ingredients || '' : '',
      book: existing && existing.slots.main ? existing.slots.main.book || '' : '',
      page: existing && existing.slots.main ? existing.slots.main.page || '' : '',
      category: existing && existing.slots.main ? existing.slots.main.category || '' : ''
    };
    ['side1', 'side2', 'soup'].forEach((slotName, offset) => {
      const value = lines[offset + 1] ? lines[offset + 1].trim() : '';
      if (!value) return;
      dinner.slots[slotName] = {
        name: value,
        recipeId: findRecipeIdByName(value, recipes),
        rawText: value
      };
    });
    entries[idx].dinner = dinner;
  }
  saveEntries();
  render();
}

function setBreakfast(idx, value) {
  entries[idx].breakfast = value || null;
  saveEntries();
  render();
}

function deleteEntry(idx) {
  const main = getDinnerMain(entries[idx].dinner);
  const label = main && main.name
    ? main.name + 'を削除しますか？'
    : 'この行を削除しますか？';
  if (!confirm(label)) return;
  entries.splice(idx, 1);
  saveEntries();
  render();
}

/* ============================================================
   RENDER
   ============================================================ */

function renderRulePicker(idx, entry, rule) {
  let options = '';
  RULE_OPTIONS.forEach(opt => {
    const value = JSON.stringify({ type: opt.type, value: opt.value });
    options += '<option value="' + escapeHTML(value) + '"' +
      (isSameRule(opt, rule) ? ' selected' : '') +
      '>' + escapeHTML(opt.label) + '</option>';
  });

  return '<label class="day-cat-picker">' +
    '<span class="day-cat' + (entry.ruleOverride ? ' overridden' : '') + '">' +
    escapeHTML(getRuleLabel(rule)) +
    '</span>' +
    '<select class="day-rule-select" aria-label="曜日ルール上書き" onchange="setEntryRuleOverride(' + idx + ', this.value)">' +
    options +
    '</select>' +
    '</label>';
}

function renderRedrawButton(idx, entry) {
  if (entry.skipped) return '';
  const label = entry.dinner ? '主菜を再抽選' : '抽選';
  return '<button class="day-btn redraw" onclick="redrawSlot(' + idx + ', \'main\')" aria-label="' + label + '" title="' + label + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8 8 0 1 0-2.5 5.5"/><path d="M20 5v5h-5"/></svg></button>';
}

function renderSlotRow(idx, dinner, slotName, label, canRedraw) {
  const slot = dinner.slots[slotName];
  const isLocked = dinner.locks[slotName];
  let html = '<div class="slot-row ' + slotName + (isLocked ? ' locked' : '') + '">' +
    '<span class="slot-label">' + label + '</span>' +
    '<span class="slot-name">' + escapeHTML(slot && slot.name ? slot.name : '—') + '</span>' +
    '<span class="slot-actions">';
  if (canRedraw) {
    html += '<button class="day-btn" onclick="redrawSlot(' + idx + ', \'' + slotName + '\')">再抽選</button>';
  }
  html += '<button class="day-btn" onclick="toggleSlotLock(' + idx + ', \'' + slotName + '\')">' +
    (isLocked ? '解除' : '固定') +
    '</button>';
  html += '</span></div>';
  return html;
}

function render() {
  pruneOldEntries();
  const tl = document.getElementById('timeline');

  if (!recipes.length && !entries.length) {
    tl.innerHTML = '<div class="tl-empty">レシピCSVをインポートしてください</div>';
    return;
  }
  if (!entries.length) {
    tl.innerHTML = '<div class="tl-empty">「＋7日分追加」で献立欄を作成</div>';
    return;
  }

  tl.innerHTML = '';
  entries.forEach((entry, idx) => {
    const isPast = entry.date < todayISO();
    const isSkipped = entry.skipped;
    const isLocked = entry.locked && !isSkipped;

    const row = document.createElement('div');
    row.className = 'day-row' +
      (isPast ? ' past' : '') +
      (isSkipped ? ' skipped' : '') +
      (isLocked ? ' locked' : '');

    // --- Left side: dinner ---
    const left = document.createElement('div');
    left.className = 'day-left';

    const rule = getEffectiveRule(entry);
    const rulePicker = renderRulePicker(idx, entry, rule);
    const redrawButton = renderRedrawButton(idx, entry);

    let html = '<div class="day-header">' +
      '<span class="day-title">' +
      '<span class="day-name">' +
      '<span class="day-date">' + escapeHTML(formatDate(entry.date)) + '</span>' +
      escapeHTML(getDayNameEN(entry.date)) +
      '</span>' +
      redrawButton +
      '</span>' +
      rulePicker +
      '</div>';

    if (isSkipped) {
      html += '<div class="day-main"><span class="day-main-text">— スキップ</span></div>';
      html += '<div class="day-actions">' +
        '<button onclick="toggleSkip(' + idx + ')">スキップ解除</button>' +
        '<button onclick="deleteEntry(' + idx + ')">削除</button>' +
        '</div>';
    } else if (entry.dinner) {
      const dinner = normalizeDinner(entry.dinner);
      entry.dinner = dinner;
      const lockLabel = isLocked ? 'ロック解除' : 'ロック';

      html += '<div class="slot-list">' +
        renderSlotRow(idx, dinner, 'main', '主菜', true) +
        renderSlotRow(idx, dinner, 'side1', '副菜1', true) +
        renderSlotRow(idx, dinner, 'side2', '副菜2', true) +
        renderSlotRow(idx, dinner, 'soup', '汁物', true) +
        '</div>';
      html += '<div class="day-main"><span class="day-inline-actions">' +
        '<button class="day-btn" onclick="toggleEditDinner(' + idx + ')">編集</button>' +
        '<button class="day-btn" onclick="clearDinner(' + idx + ')">クリア</button>' +
        '<button class="day-btn" onclick="toggleLock(' + idx + ')">' + lockLabel + '</button>' +
        '<button class="day-btn" onclick="toggleSkip(' + idx + ')">スキップ</button>' +
        '<button class="day-btn danger" onclick="deleteEntry(' + idx + ')">削除</button>' +
        '</span>';
      html += '</div>';
      const mainSlot = dinner.slots.main;
      if (mainSlot && mainSlot.ingredients) {
        html += '<details class="ing-toggle" open><summary>材料</summary>' +
          '<div class="ing-content">' + escapeHTML(mainSlot.ingredients) + '</div>';
        if (mainSlot.book) {
          html += '<div class="ing-ref">' + escapeHTML(mainSlot.book) +
            (mainSlot.page ? ' p.' + escapeHTML(mainSlot.page) : '') +
            '</div>';
        }
        html += '</details>';
      }
      if (dinner.rawExample) {
        html += '<div class="day-sides">献立例: ' + escapeHTML(dinner.rawExample) + '</div>';
      }
      html += '<div class="day-edit" id="edit-' + idx + '">' +
        '<textarea id="edit-ta-' + idx + '"></textarea>' +
        '<div class="day-edit-actions">' +
        '<button onclick="cancelEdit(' + idx + ')">キャンセル</button>' +
        '<button class="save-btn" onclick="saveEdit(' + idx + ')">保存</button>' +
        '</div></div>';
    } else {
      html += '<div class="day-main">' +
        '<span class="day-main-text" style="color:var(--text-faint)">—</span>';
      html += '<span class="day-inline-actions">' +
        '<button class="day-btn" onclick="toggleEditDinner(' + idx + ')">手入力</button>' +
        '<button class="day-btn" onclick="toggleSkip(' + idx + ')">スキップ</button>' +
        '<button class="day-btn danger" onclick="deleteEntry(' + idx + ')">削除</button>' +
        '</span>';
      html += '</div>';
      html += '<div class="day-edit" id="edit-' + idx + '">' +
        '<textarea id="edit-ta-' + idx + '"></textarea>' +
        '<div class="day-edit-actions">' +
        '<button onclick="cancelEdit(' + idx + ')">キャンセル</button>' +
        '<button class="save-btn" onclick="saveEdit(' + idx + ')">保存</button>' +
        '</div></div>';
    }

    left.innerHTML = html;

    // Set textarea value via DOM (not innerHTML) to avoid entity issues
    if (entry.dinner) {
      const ta = left.querySelector('#edit-ta-' + idx);
      if (ta) {
        const dinner = normalizeDinner(entry.dinner);
        ta.value = [
          dinner && dinner.slots.main ? dinner.slots.main.name : '',
          dinner && dinner.slots.side1 ? dinner.slots.side1.name : '',
          dinner && dinner.slots.side2 ? dinner.slots.side2.name : '',
          dinner && dinner.slots.soup ? dinner.slots.soup.name : ''
        ].filter(Boolean).join('\n');
      }
    }

    // --- Right side: breakfast ---
    const right = document.createElement('div');
    right.className = 'day-bf';

    const bfLabel = document.createElement('div');
    bfLabel.className = 'day-bf-label';
    bfLabel.textContent = '朝';
    right.appendChild(bfLabel);

    // 選択中パターンを改行表示（selectの表示はopacity:0で隠している）
    const bfText = document.createElement('div');
    bfText.className = 'day-bf-text';
    bfText.textContent = (entry.breakfast || '—').replace(/・/g, '\n');
    right.appendChild(bfText);

    const select = document.createElement('select');
    select.addEventListener('change', function() { setBreakfast(idx, this.value); });

    const emptyOpt = document.createElement('option');
    emptyOpt.value = '';
    emptyOpt.textContent = '—';
    select.appendChild(emptyOpt);

    breakfastPatterns.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.name;
      opt.textContent = p.name;
      if (entry.breakfast === p.name) opt.selected = true;
      select.appendChild(opt);
    });

    if (entry.breakfast && !breakfastPatterns.some(p => p.name === entry.breakfast)) {
      const opt = document.createElement('option');
      opt.value = entry.breakfast;
      opt.textContent = entry.breakfast;
      opt.selected = true;
      select.appendChild(opt);
    }

    right.appendChild(select);

    row.appendChild(left);
    row.appendChild(right);
    tl.appendChild(row);
  });
}

/* ============================================================
   SHOPPING LIST
   ============================================================ */

function findBreakfastIngredients(name) {
  if (!name) return '';
  const pattern = breakfastPatterns.find(p => p.name === name);
  return pattern && pattern.ingredients ? pattern.ingredients : '';
}

function openShoppingList() {
  const body = document.getElementById('shop-body');
  const items = [];

  function collectItems(filter) {
    entries.forEach(entry => {
      if (!filter(entry)) return;
      const parts = [];
      const dinner = normalizeDinner(entry.dinner);
      if (dinner && dinner.slots.main && dinner.slots.main.ingredients) {
        parts.push(dinner.slots.main.ingredients);
      }
      if (dinner) {
        ['side1', 'side2', 'soup'].forEach(slotName => {
          const slot = dinner.slots[slotName];
          if (!slot || !slot.recipeId) return;
          const recipe = findRecipeById(slot.recipeId);
          if (recipe && recipe.ingredients) {
            parts.push('【' + (slotName === 'soup' ? '汁物' : '副菜') + '】' + recipe.ingredients);
          }
        });
      }
      const bfIng = findBreakfastIngredients(entry.breakfast);
      if (bfIng) parts.push('【朝】' + bfIng);
      if (parts.length) {
        items.push({
          label: getDayName(entry.date) + ' ' + formatDate(entry.date),
          text: parts.join('\n')
        });
      }
    });
  }

  collectItems(e => e.dinner || e.breakfast);

  if (items.length) {
    body.innerHTML = '';
    items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'shop-day';

      const h3 = document.createElement('h3');
      h3.textContent = item.label;
      div.appendChild(h3);

      const pre = document.createElement('pre');
      pre.textContent = item.text;
      div.appendChild(pre);

      body.appendChild(div);
    });
  } else {
    body.innerHTML = '<div style="color:var(--text-faint);font-size:13px">献立を作成してください</div>';
  }

  document.getElementById('shop-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeShoppingList(e) {
  if (e && e.target !== document.getElementById('shop-overlay')) return;
  document.getElementById('shop-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

/* ============================================================
   INIT
   ============================================================ */

normalizeEntries();
saveRecipeData();
renderRules();
renderBreakfastPatterns();
renderPriorityTags();
render();

if (recipes.length) {
  document.getElementById('csv-status').textContent =
    recipes.length + '件 / MealSet ' + mealSets.length + '件 読み込み済';
}
</script>
