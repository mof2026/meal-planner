document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e;\n  box-shadow: 0 1px 0 rgba(0,0,0,.02);\n}\n@media (min-width: 768px) {\n  body { padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom); }\n  .page { margin: 24px auto; }\n}\n\n/* ===== Header ===== */\n.hd { padding: 24px 24px 16px; display: flex; justify-content: space-between; align-items: baseline; }\n.hd h1 { font-size: 13px; font-weight: 300; color: var(--text-light); letter-spacing: .12em; }\n.hd-a { display: flex; gap: 16px; }\n.hd-a button { background: none; border: none; color: var(--text-light); font-size: 15px; cursor: pointer; padding: 0; }\n\n/* ===== Panels ===== */\n.pnl { display: none; padding: 16px 24px 20px; border-top: 1px solid var(--line); }\n.pnl.open { display: block; }\n.pnl-lb { font-size: 11px; font-weight: 300; color: var(--text-light); letter-spacing: .06em; margin-bottom: 10px; }\n.pnl-x { float: right; background: none; border: none; color: var(--text-faint); font-size: 16px; cursor: pointer; }\n\n/* Day rules */\n.rg { display: grid; grid-template-columns: 28px 1fr; gap: 6px 12px; align-items: center; }\n.rg .rl { font-size: 12px; color: var(--text-light); }\n.rg select {\n  font-family: var(--font); font-size: 13px; font-weight: 300; color: var(--text);\n  background: transparent; border: none; border-bottom: 1px solid var(--line);\n  border-radius: 0; padding: 4px 0; width: 100%; -webkit-appearance: none; appearance: none;\n}\n.rr {\n  margin-top: 10px; font-family: var(--font); font-size: 11px; font-weight: 300;\n  color: var(--text-faint); background: none; border: none; cursor: pointer;\n  text-decoration: underline; text-underline-offset: 2px;\n}\n\n/* Breakfast patterns */\n.bp-list { margin-bottom: 8px; }\n.bp-item { display: flex; align-items: center; gap: 8px; padding: 3px 0; border-bottom: 1px solid var(--line); }\n.bp-item span { font-size: 12px; color: var(--text); flex: 1; }\n.bp-item .bp-ing { font-size: 10px; color: var(--text-faint); flex: 1; }\n.bp-item button { background: none; border: none; color: var(--text-faint); font-size: 12px; cursor: pointer; padding: 0; }\n.bp-add { display: flex; gap: 6px; align-items: center; }\n.bp-add input {\n  font-family: var(--font); font-size: 12px; font-weight: 300; color: var(--text);\n  border: none; border-bottom: 1px solid var(--line); outline: none;\n  background: transparent; padding: 2px 0; min-width: 0;\n}\n.bp-add button { font-family: var(--font); font-size: 11px; color: var(--text-light); background: none; border: none; cursor: pointer; }\n\n/* CSV */\n.csv-d { border-bottom: 1px dashed var(--line); padding: 16px 0; text-align: center; color: var(--text-light); font-size: 12px; cursor: pointer; }\n.csv-d input { display: none; }\n.csv-s { margin-top: 6px; font-size: 11px; color: var(--text-light); }\n\n/* Priority */\n.pri { padding: 10px 24px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }\n.pri-lb { font-size: 11px; color: var(--text-faint); white-space: nowrap; }\n.pri-tag { font-size: 12px; color: var(--text); border-bottom: 1px solid var(--line); padding: 1px 2px; display: inline-flex; align-items: center; gap: 4px; }\n.pri-tag button { background: none; border: none; color: var(--text-faint); font-size: 12px; cursor: pointer; padding: 0; }\n.pri input {\n  font-family: var(--font); font-size: 12px; font-weight: 300; color: var(--text);\n  border: none; border-bottom: 1px solid var(--line); outline: none;\n  background: transparent; width: 100px; padding: 2px 0;\n}\n.pri input::placeholder { color: var(--text-faint); }\n\n/* Action bar */\n.ab { padding: 10px 24px; display: flex; gap: 14px; align-items: center; border-top: 1px solid var(--line); flex-wrap: wrap; }\n.ab button { font-family: var(--font); font-size: 12px; font-weight: 300; color: var(--text-mid); background: none; border: none; cursor: pointer; padding: 4px 0; }\n.ab button:active { color: var(--text); }\n.ab .ab-primary { color: var(--accent); font-weight: 400; }\n\n/* ===== Timeline ===== menu name */\n.day-inline-actions {\n  display: inline-flex; align-items: center; gap: 2px;\n  flex-shrink: 0; margin-left: auto;\n}\n.day-btn {\n  background: none; border: none;\n  font-family: var(--font); font-size: 11px; font-weight: 300;\n  color: var(--text-mid); cursor: pointer;\n  padding: 7px 9px; border-radius: 14px;\n  letter-spacing: .02em;\n  line-height: 1;\n  white-space: nowrap;\n  transition: background .12s, color .12s;\n}\n.day-btn:active { color: var(--text); background: var(--surface); }\n@media (hover: hover) {\n  .day-btn:hover { color: var(--text); background: var(--surface); }\n}\n\n/* Primary redraw — icon */\n.day-btn.redraw {\n  color: var(--text-mid);\n  font-size: 22px;\n  font-weight: 200;\n  padding: 2px 10px;\n  line-height: 1;\n}\n.day-btn.redraw:active,\n.day-btn.redraw:hover { color: var(--text); background: var(--surface); }\n\n/* Destructive — slightly faded */\n.day-btn.danger { color: var(--text-faint); }\n\n/* Legacy day-actions row (used on skipped / confirmed rows) */\n.day-actions { display: flex; gap: 2px; margin-top: 2px; flex-wrap: wrap; margin-left: -9px; }\n.day-actions button {\n  background: none; border: none;\n  font-family: var(--font); font-size: 11px; font-weight: 300;\n  color: var(--text-mid); cursor: pointer;\n  padding: 7px 9px; border-radius: 14px; letter-spacing: .02em; line-height: 1;\n}\n.day-actions button:active { color: var(--text); background: var(--surface); }\n@media (hover: hover) {\n  .day-actions button:hover { color: var(--text); background: var(--surface); }\n}\n\n/* Ingredients detail */\n.ing-toggle { margin-top: 4px; }\n.ing-toggle summary { font-size: 11px; color: var(--text-light); cursor: pointer; list-style: none; }\n.ing-toggle summary::before { content: '▸ '; font-size: 9px; }\n.ing-toggle[open] summary::before { content: '▾ '; }\n.ing-content { font-size: 12px; color: var(--text-mid); padding: 4px 0; white-space: pre-wrap; line-height: 1.7; }\n.ing-ref { font-size: 10px; color: var(--text-light); margin-top: 2px; }\n\n/* Edit area */\n.day-edit { display: none; margin-top: 4px; }\n.day-edit textarea {\n  font-family: var(--font); font-size: 14px; font-weight: 300; color: var(--text);\n  border: none; border-bottom: 1px solid var(--line); outline: none;\n  background: transparent; width: 100%; min-height: 56px; resize: none; padding: 4px 0; line-height: 1.6;\n}\n.day-edit-actions { display: flex; gap: 14px; margin-top: 4px; }\n.day-edit-actions button {\n  font-family: var(--font); font-size: 11px; font-weight: 300;\n  background: none; border: none; cursor: pointer; padding: 0; color: var(--text-light);\n}\n.day-edit-actions .save-btn { color: var(--text); }\n\n/* Right: breakfast */\n.day-bf { padding: 10px 0 8px 10px; font-size: 12px; color: var(--text-mid); display: flex; flex-direction: column; }\n.day-bf-label { font-size: 9px; color: var(--text-faint); letter-spacing: .04em; margin-bottom: 2px; }\n.day-bf select {\n  font-family: var(--font); font-size: 12px; font-weight: 300; color: var(--text-mid);\n  background: transparent; border: none; -webkit-appearance: none; appearance: none;\n  padding: 0; width: 100%; cursor: pointer; outline: none;\n}\n.day-row.confirmed .day-bf select { color: var(--text-faint); pointer-events: none; }\n.day-bf-text { font-size: 12px; color: var(--text-faint); }\n\n/* Modal */\n.overlay { display: none; position: fixed; inset: 0; background: rgba(90,85,78,.2); z-index: 100; }\n.overlay.open { display: flex; align-items: flex-end; }\n.modal {\n  background: var(--bg); width: 100%; max-height: 85vh;\n  border-radius: 12px 12px 0 0; overflow-y: auto; padding: 24px; -webkit-overflow-scrolling: touch;\n}\n.modal-title { font-size: 13px; font-weight: 300; color: var(--text-light); letter-spacing: .06em; margin-bottom: 16px; }\n.modal-close { float: right; background: none; border: none; font-size: 16px; color: var(--text-faint); cursor: pointer; }\n.shop-day { border-top: 1px solid var(--line); padding: 10px 0; }\n.shop-day h3 { font-size: 11px; font-weight: 300; color: var(--text-faint); margin-bottom: 4px; letter-spacing: .06em; }\n.shop-day pre { font-family: var(--font); font-size: 12px; font-weight: 300; color: var(--text); white-space: pre-wrap; line-height: 1.7; }\n\n@media (min-width: 768px) {\n  .modal { max-width: 560px; margin: 0 auto; border-radius: 12px; }\n  .overlay.open { align-items: center; justify-content: center; }\n\n  /* Wide screen: larger text for tablet readability */\n  .hd h1 { font-size: 14px; }\n  .hd-a button { font-size: 18px; }\n  .pnl-lb { font-size: 13px; }\n  .rg .rl { font-size: 14px; }\n  .rg select { font-size: 15px; }\n  .bp-item span { font-size: 14px; }\n  .bp-item .bp-ing { font-size: 12px; }\n  .bp-add input { font-size: 14px; }\n  .csv-d { font-size: 14px; }\n  .pri-lb { font-size: 13px; }\n  .pri-tag { font-size: 14px; }\n  .pri input { font-size: 14px; }\n  .ab button { font-size: 14px; }\n  .tl-empty { font-size: 15px; }\n  .day-name { font-size: 13px; }\n  .day-date { font-size: 12px; }\n  .day-cat { font-size: 12px; }\n  .day-main { font-size: 18px; }\n  .day-sides { font-size: 14px; }\n  .day-actions button { font-size: 12px; }\n  .ing-toggle summary { font-size: 13px; }\n  .ing-content { font-size: 14px; }\n  .ing-ref { font-size: 12px; }\n  .day-edit textarea { font-size: 16px; }\n  .day-bf { font-size: 14px; }\n  .day-bf-label { font-size: 11px; }\n  .day-bf select { font-size: 14px; }\n  .day-bf-text { font-size: 14px; }\n  .shop-day h3 { font-size: 13px; }\n  .shop-day pre { font-size: 14px; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<div class=\"page\">\n<div class=\"hd\">\n  <h1>献立プランナー<\u002Fh1>\n  <div class=\"hd-a\">\n    <button onclick=\"togglePanel('panel-import')\" title=\"インポート\">↓<\u002Fbutton>\n    <button onclick=\"togglePanel('panel-settings')\" title=\"設定\">⚙<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"panel-settings\" class=\"pnl\">\n  <button class=\"pnl-x\" onclick=\"togglePanel('panel-settings')\">✕<\u002Fbutton>\n  <div class=\"pnl-lb\">曜日ルール<\u002Fdiv>\n  <div class=\"rg\" id=\"rules-grid\"><\u002Fdiv>\n  <button class=\"rr\" onclick=\"resetRules()\">デフォルトに戻す<\u002Fbutton>\n  <div style=\"margin-top:20px\">\n    <div class=\"pnl-lb\">朝食パターン<\u002Fdiv>\n    <div class=\"bp-list\" id=\"bp-list\"><\u002Fdiv>\n    <div class=\"bp-add\">\n      <input type=\"text\" id=\"bp-name-input\" placeholder=\"メニュー名…\" style=\"flex:2\">\n      <input type=\"text\" id=\"bp-ing-input\" placeholder=\"材料（任意）…\" style=\"flex:3\">\n      <button onclick=\"addBreakfastPattern()\">追加<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:20px\">\n    <div class=\"pnl-lb\">設定データ（朝食パターン・曜日ルール・優先食材）<\u002Fdiv>\n    <div style=\"display:flex;gap:12px;margin-top:8px\">\n      <button class=\"rr\" style=\"margin:0\" onclick=\"exportSettings()\">書き出し<\u002Fbutton>\n      <button class=\"rr\" style=\"margin:0\" onclick=\"document.getElementById('settings-file').click()\">読み込み<\u002Fbutton>\n      <input type=\"file\" id=\"settings-file\" accept=\".json\" style=\"display:none\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"panel-import\" class=\"pnl\">\n  <button class=\"pnl-x\" onclick=\"togglePanel('panel-import')\">✕<\u002Fbutton>\n  <div class=\"pnl-lb\">CSVインポート<\u002Fdiv>\n  <div class=\"csv-d\" id=\"csv-drop\" onclick=\"document.getElementById('csv-file').click()\">\n    タップしてCSVを選択\n    <input type=\"file\" id=\"csv-file\" accept=\".csv\">\n  <\u002Fdiv>\n  <div class=\"csv-s\" id=\"csv-status\"><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"pri\">\n  <span class=\"pri-lb\">使い切り食材<\u002Fspan>\n  <span id=\"priority-tags\"><\u002Fspan>\n  <input type=\"text\" id=\"priority-input\" placeholder=\"入力…\" onkeydown=\"handlePriorityKey(event)\">\n<\u002Fdiv>\n\n<div class=\"ab\">\n  <button class=\"ab-primary\" onclick=\"addDays(7)\">＋7日分追加<\u002Fbutton>\n  <button class=\"ab-primary\" onclick=\"addDays(1)\">＋1日<\u002Fbutton>\n  <button onclick=\"lotteryDrafts()\">抽選<\u002Fbutton>\n  <button onclick=\"confirmDrafts()\">ここまで確定<\u002Fbutton>\n  <button onclick=\"openShoppingList()\">買い物リスト<\u002Fbutton>\n  <button onclick=\"resetAll()\">リセット<\u002Fbutton>\n<\u002Fdiv>\n\n<div class=\"tl\" id=\"timeline\"><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"overlay\" id=\"shop-overlay\" onclick=\"closeShoppingList(event)\">\n  <div class=\"modal\" onclick=\"event.stopPropagation()\">\n    <button class=\"modal-close\" onclick=\"closeShoppingList()\">✕<\u002Fbutton>\n    <div class=\"modal-title\">買い物リスト<\u002Fdiv>\n    <div id=\"shop-body\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n'use strict';\n\n/* ============================================================\n   VERSION — clear old localStorage on schema change\n   ============================================================ */\n\nconst APP_VERSION = '7';\nif (localStorage.getItem('mp_version') !== APP_VERSION) {\n  // Clear all app data (keys prefixed with mp_)\n  const keysToRemove = [];\n  for (let i = 0; i < localStorage.length; i++) {\n    const key = localStorage.key(i);\n    if (key && key.startsWith('mp_')) keysToRemove.push(key);\n  }\n  keysToRemove.forEach(k => localStorage.removeItem(k));\n  localStorage.setItem('mp_version', APP_VERSION);\n}\n\n/* ============================================================\n   DATA LAYER\n   ============================================================ */\n\nconst Storage = {\n  get(key) {\n    try {\n      const raw = localStorage.getItem('mp_' + key);\n      return raw ? JSON.parse(raw) : null;\n    } catch { return null; }\n  },\n  _saveWarned: false,\n  set(key, value) {\n    try {\n      localStorage.setItem('mp_' + key, JSON.stringify(value));\n    } catch (e) {\n      console.warn('localStorage save failed:', key, e);\n      if (!this._saveWarned) {\n        this._saveWarned = true;\n        alert('データの保存に失敗しました。ストレージの容量が不足している可能性があります。');\n      }\n    }\n  }\n};\n\n/**\n * Parse CSV text into array of objects.\n * Handles BOM, CRLF, quoted fields with escaped quotes.\n */\nfunction parseCSV(text) {\n  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);\n  text = text.replace(/\\r\\n/g, '\\n').replace(/\\r/g, '\\n');\n\n  const rows = [];\n  let pos = 0;\n  const len = text.length;\n\n  while (pos < len) {\n    const row = [];\n    while (pos < len) {\n      let value = '';\n      if (text[pos] === '\"') {\n        pos++;\n        while (pos < len) {\n          if (text[pos] === '\"') {\n            if (pos + 1 < len && text[pos + 1] === '\"') {\n              value += '\"';\n              pos += 2;\n            } else {\n              pos++;\n              break;\n            }\n          } else {\n            value += text[pos];\n            pos++;\n          }\n        }\n        if (pos < len && text[pos] === ',') { pos++; }\n        else if (pos < len && text[pos] === '\\n') { pos++; row.push(value); break; }\n        else { row.push(value); break; }\n      } else {\n        const nextComma = text.indexOf(',', pos);\n        const nextNewline = text.indexOf('\\n', pos);\n        const end = (nextComma === -1 && nextNewline === -1) ? len\n          : (nextComma === -1) ? nextNewline\n          : (nextNewline === -1) ? nextComma\n          : Math.min(nextComma, nextNewline);\n        value = text.substring(pos, end);\n        pos = end;\n        if (pos < len && text[pos] === ',') { pos++; }\n        else if (pos < len && text[pos] === '\\n') { pos++; row.push(value); break; }\n        else { row.push(value); break; }\n      }\n      row.push(value);\n    }\n    if (row.length > 0 && !(row.length === 1 && row[0] === '')) {\n      rows.push(row);\n    }\n  }\n\n  if (rows.length < 2) return [];\n  const headers = rows[0].map(h => h.trim());\n  return rows.slice(1).map(row => {\n    const obj = {};\n    headers.forEach((h, j) => { obj[h] = (row[j] || '').trim(); });\n    return obj;\n  });\n}\n\n/** Convert parsed CSV rows to recipe objects. */\nfunction csvToRecipes(parsed) {\n  return parsed.map((row, idx) => ({\n    id: idx,\n    name: row['名前'] || '',\n    category: row['カテゴリ'] || '',\n    tag: row['タグ'] || '',\n    ingredients: row['主な材料'] || '',\n    sideOptions: [row['献立例1'], row['献立例2'], row['献立例3'], row['献立例4']]\n      .filter(s => s && s.trim()),\n    book: row['レシピ本'] || '',\n    page: row['ページ'] || '',\n    hotcookKey: row['ホットクックキー'] || ''\n  }));\n}\n\n/* ============================================================\n   LOGIC LAYER\n   ============================================================ */\n\nconst DAY_OF_WEEK = ['日', '月', '火', '水', '木', '金', '土'];\nconst DAY_OF_WEEK_EN = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];\n\nconst DEFAULT_RULES = {\n  '月': { type: 'cat', value: '魚' },\n  '火': { type: 'cat', value: '魚' },\n  '水': { type: 'cat', value: '大豆（貝・えびも含む）' },\n  '木': { type: 'cat', value: '肉' },\n  '金': { type: 'cat', value: '魚' },\n  '土': { type: 'tag', value: '休日夜' },\n  '日': { type: 'tag', value: '休日夜' }\n};\n\nconst RULE_OPTIONS = [\n  { label: '魚',     type: 'cat', value: '魚' },\n  { label: '肉',     type: 'cat', value: '肉' },\n  { label: '大豆',   type: 'cat', value: '大豆（貝・えびも含む）' },\n  { label: '一品料理', type: 'cat', value: '一品料理' },\n  { label: '休日夜', type: 'tag', value: '休日夜' }\n];\n\nconst KEY_INGREDIENTS = [\n  '鮭','鯖','さば','ぶり','鰤','たら','鱈','鯛','さわら','あじ','かつお','まぐろ',\n  '鶏','とり','チキン','豚','ぶた','牛','ビーフ',\n  '豆腐','厚揚げ','生揚げ','えび','エビ','海老','いか','イカ',\n  'ハンバーグ','ツナ','しらす','サーモン','めかじき','かじき',\n  'さんま','いわし','ほたて','あさり','合いびき','合挽き','ひき肉'\n];\n\nconst DEFAULT_BREAKFAST_PATTERNS = [\n  { name: 'パン・ヨーグルト・果物', ingredients: '食パン、ヨーグルト、果物' },\n  { name: 'グラノーラ・バナナ・ヨーグルト', ingredients: 'グラノーラ、バナナ、ヨーグルト' }\n];\n\n/* ----- Date helpers (local timezone safe) ----- */\n\nfunction toLocalDate(isoString) {\n  const parts = isoString.split('-').map(Number);\n  return new Date(parts[0], parts[1] - 1, parts[2]);\n}\n\nfunction toISOString(date) {\n  return date.getFullYear() + '-' +\n    String(date.getMonth() + 1).padStart(2, '0') + '-' +\n    String(date.getDate()).padStart(2, '0');\n}\n\nfunction todayISO() {\n  return toISOString(new Date());\n}\n\nfunction addDaysToISO(isoString, numDays) {\n  const d = toLocalDate(isoString);\n  d.setDate(d.getDate() + numDays);\n  return toISOString(d);\n}\n\nfunction getDayName(isoString) {\n  return DAY_OF_WEEK[toLocalDate(isoString).getDay()];\n}\n\nfunction getDayNameEN(isoString) {\n  return DAY_OF_WEEK_EN[toLocalDate(isoString).getDay()];\n}\n\nfunction formatDate(isoString) {\n  const d = toLocalDate(isoString);\n  return (d.getMonth() + 1) + '/' + d.getDate();\n}\n\n/* ----- Rule helpers ----- */\n\nfunction getRules() {\n  return Storage.get('rules') || { ...DEFAULT_RULES };\n}\n\nfunction getRuleForDay(dayName) {\n  const rules = Storage.get('rules') || DEFAULT_RULES;\n  return rules[dayName] || DEFAULT_RULES[dayName];\n}\n\nfunction filterByRule(allRecipes, rule) {\n  if (rule.type === 'tag') {\n    return allRecipes.filter(r => r.tag.includes(rule.value));\n  }\n  return allRecipes.filter(r => r.category === rule.value && !r.tag.includes('休日夜'));\n}\n\n/* ----- Conflict detection ----- */\n\nfunction extractKeyIngredients(text) {\n  return KEY_INGREDIENTS.filter(k => text.includes(k));\n}\n\nfunction hasIngredientConflict(dinnerA, dinnerB) {\n  if (!dinnerA || !dinnerB || !dinnerA.ingredients || !dinnerB.ingredients) return false;\n  const keysA = extractKeyIngredients(dinnerA.ingredients);\n  const keysB = extractKeyIngredients(dinnerB.ingredients);\n  return keysA.some(a => keysB.some(b => a === b || a.includes(b) || b.includes(a)));\n}\n\n/* ----- Lottery ----- */\n\nfunction getRecentlyUsedNames() {\n  const cutoff = addDaysToISO(todayISO(), -14);\n  const names = [];\n  for (const entry of entries) {\n    if (entry.dinner && entry.dinner.name) {\n      if (entry.status === 'confirmed' && entry.date >= cutoff) {\n        names.push(entry.dinner.name);\n      }\n      if (entry.status === 'draft') {\n        names.push(entry.dinner.name);\n      }\n    }\n  }\n  return names;\n}\n\nfunction drawForEntry(idx) {\n  const entry = entries[idx];\n  const dayName = getDayName(entry.date);\n  const rule = getRuleForDay(dayName);\n  let candidates = filterByRule(recipes, rule);\n  if (!candidates.length) return null;\n\n  const usedNames = getRecentlyUsedNames();\n  const fresh = candidates.filter(r => !usedNames.includes(r.name));\n  if (fresh.length) candidates = fresh;\n\n  const prevDinner = idx > 0 && entries[idx - 1].dinner\n    ? entries[idx - 1].dinner : null;\n  const nextDinner = idx < entries.length - 1 && entries[idx + 1].dinner\n    ? entries[idx + 1].dinner : null;\n  const noConflict = candidates.filter(r =>\n    !hasIngredientConflict({ ingredients: r.ingredients }, prevDinner) &&\n    !hasIngredientConflict({ ingredients: r.ingredients }, nextDinner)\n  );\n  if (noConflict.length) candidates = noConflict;\n\n  if (priorities.length) {\n    const prioritized = candidates.filter(r =>\n      priorities.some(p => r.ingredients.includes(p) || r.name.includes(p))\n    );\n    if (prioritized.length && Math.random() < 0.7) {\n      candidates = prioritized;\n    } else if (prioritized.length) {\n      candidates = [...prioritized, ...prioritized, ...candidates];\n    }\n  }\n\n  const picked = candidates[Math.floor(Math.random() * candidates.length)];\n  const sides = picked.sideOptions.length ? picked.sideOptions.join(' / ') : '';\n\n  return {\n    name: picked.name,\n    sides: sides,\n    ingredients: picked.ingredients,\n    book: picked.book,\n    page: picked.page,\n    category: picked.category\n  };\n}\n\n/* ============================================================\n   UI LAYER\n   ============================================================ */\n\n/**\n * Escape string for safe use in both HTML content and attribute values.\n * Covers: & < > \" '\n */\nfunction escapeHTML(str) {\n  return String(str)\n    .replace(/&/g, '&amp;')\n    .replace(/<\u002Fg, '&lt;')\n    .replace(/>/g, '&gt;')\n    .replace(/\"/g, '&quot;')\n    .replace(/'/g, '&#39;');\n}\n\nfunction togglePanel(id) {\n  document.getElementById(id).classList.toggle('open');\n}\n\n/* ----- State ----- */\n\nlet recipes = Storage.get('recs') || [];\nlet entries = Storage.get('entries') || [];\nlet priorities = Storage.get('prio') || [];\nlet breakfastPatterns = Storage.get('bpats') || [...DEFAULT_BREAKFAST_PATTERNS];\n\nfunction saveEntries() { Storage.set('entries', entries); }\n\n/* ----- Rules UI ----- */\n\nfunction renderRules() {\n  const grid = document.getElementById('rules-grid');\n  const rules = getRules();\n  grid.innerHTML = '';\n\n  ['月', '火', '水', '木', '金', '土', '日'].forEach(day => {\n    const rule = rules[day] || DEFAULT_RULES[day];\n\n    const label = document.createElement('span');\n    label.className = 'rl';\n    label.textContent = day;\n\n    const select = document.createElement('select');\n    RULE_OPTIONS.forEach(opt => {\n      const option = document.createElement('option');\n      option.value = JSON.stringify({ type: opt.type, value: opt.value });\n      option.textContent = opt.label;\n      if (opt.type === rule.type && opt.value === rule.value) option.selected = true;\n      select.appendChild(option);\n    });\n    select.addEventListener('change', () => {\n      const allRules = getRules();\n      allRules[day] = JSON.parse(select.value);\n      Storage.set('rules', allRules);\n    });\n\n    grid.appendChild(label);\n    grid.appendChild(select);\n  });\n}\n\nfunction resetRules() {\n  Storage.set('rules', { ...DEFAULT_RULES });\n  renderRules();\n}\n\n/* ----- Breakfast Patterns UI ----- */\n\nfunction renderBreakfastPatterns() {\n  const list = document.getElementById('bp-list');\n  list.innerHTML = '';\n  breakfastPatterns.forEach((pattern, idx) => {\n    const div = document.createElement('div');\n    div.className = 'bp-item';\n\n    const nameSpan = document.createElement('span');\n    nameSpan.textContent = pattern.name;\n    div.appendChild(nameSpan);\n\n    if (pattern.ingredients) {\n      const ingSpan = document.createElement('span');\n      ingSpan.className = 'bp-ing';\n      ingSpan.textContent = pattern.ingredients;\n      div.appendChild(ingSpan);\n    }\n\n    const delBtn = document.createElement('button');\n    delBtn.textContent = '✕';\n    delBtn.addEventListener('click', () => removeBreakfastPattern(idx));\n    div.appendChild(delBtn);\n\n    list.appendChild(div);\n  });\n}\n\nfunction addBreakfastPattern() {\n  const nameInput = document.getElementById('bp-name-input');\n  const ingInput = document.getElementById('bp-ing-input');\n  const name = nameInput.value.trim();\n  if (!name) return;\n  breakfastPatterns.push({ name: name, ingredients: ingInput.value.trim() });\n  nameInput.value = '';\n  ingInput.value = '';\n  Storage.set('bpats', breakfastPatterns);\n  renderBreakfastPatterns();\n  render();\n}\n\nfunction removeBreakfastPattern(idx) {\n  breakfastPatterns.splice(idx, 1);\n  Storage.set('bpats', breakfastPatterns);\n  renderBreakfastPatterns();\n  render();\n}\n\n/* ----- Settings Export / Import ----- */\n\nfunction exportSettings() {\n  const data = {\n    _type: 'meal_planner_settings',\n    _schemaVersion: 1,\n    _exported: new Date().toISOString(),\n    breakfastPatterns: breakfastPatterns,\n    rules: getRules(),\n    priorities: priorities\n  };\n  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });\n  const url = URL.createObjectURL(blob);\n  const a = document.createElement('a');\n  a.href = url;\n  a.download = '献立プランナー設定_' +\n    todayISO().replace(/-/g, '') + '.json';\n  document.body.appendChild(a);\n  a.click();\n  document.body.removeChild(a);\n  URL.revokeObjectURL(url);\n}\n\ndocument.getElementById('settings-file').addEventListener('change', function(e) {\n  if (!e.target.files.length) return;\n  const file = e.target.files[0];\n  if (file.size > 1 * 1024 * 1024) {\n    alert('ファイルサイズが大きすぎます');\n    e.target.value = '';\n    return;\n  }\n  const reader = new FileReader();\n  reader.onload = function(ev) {\n    try {\n      const data = JSON.parse(ev.target.result);\n      if (data._type !== 'meal_planner_settings') {\n        alert('献立プランナーの設定ファイルではありません');\n        return;\n      }\n      const parts = [];\n      if (Array.isArray(data.breakfastPatterns)) parts.push('朝食パターン ' + data.breakfastPatterns.length + '件');\n      if (data.rules) parts.push('曜日ルール');\n      if (Array.isArray(data.priorities) && data.priorities.length) parts.push('優先食材 ' + data.priorities.length + '件');\n      if (!parts.length) { alert('読み込めるデータがありません'); return; }\n\n      if (!confirm('以下を上書きします：\\n' + parts.join('、') + '\\n\\nよろしいですか？')) return;\n\n      if (Array.isArray(data.breakfastPatterns)) {\n        breakfastPatterns = data.breakfastPatterns\n          .filter(p => p && typeof p.name === 'string' && p.name.trim())\n          .map(p => ({\n            name: String(p.name),\n            ingredients: typeof p.ingredients === 'string' ? p.ingredients : ''\n          }));\n        Storage.set('bpats', breakfastPatterns);\n      }\n      if (data.rules && typeof data.rules === 'object' && !Array.isArray(data.rules)) {\n        Storage.set('rules', data.rules);\n      }\n      if (Array.isArray(data.priorities)) {\n        priorities = data.priorities.filter(p => typeof p === 'string');\n        Storage.set('prio', priorities);\n      }\n\n      renderRules();\n      renderBreakfastPatterns();\n      renderPriorityTags();\n      render();\n      alert('設定を読み込みました');\n    } catch (err) {\n      alert('ファイルの読み込みに失敗しました');\n    }\n  };\n  reader.readAsText(file, 'UTF-8');\n  e.target.value = '';\n});\n\n/* ----- CSV Import ----- */\n\nconst csvDrop = document.getElementById('csv-drop');\nconst csvFileInput = document.getElementById('csv-file');\ncsvDrop.addEventListener('dragover', e => e.preventDefault());\ncsvDrop.addEventListener('drop', e => {\n  e.preventDefault();\n  if (e.dataTransfer.files.length) loadCSV(e.dataTransfer.files[0]);\n});\ncsvFileInput.addEventListener('change', e => {\n  if (e.target.files.length) loadCSV(e.target.files[0]);\n});\n\nfunction loadCSV(file) {\n  if (file.size > 5 * 1024 * 1024) {\n    alert('ファイルサイズが大きすぎます（上限5MB）');\n    return;\n  }\n  const reader = new FileReader();\n  reader.onload = e => {\n    recipes = csvToRecipes(parseCSV(e.target.result));\n    Storage.set('recs', recipes);\n    const counts = {};\n    recipes.forEach(r => { counts[r.category] = (counts[r.category] || 0) + 1; });\n    const summary = Object.entries(counts)\n      .map(([k, v]) => k + ' ' + v).join('　');\n    document.getElementById('csv-status').textContent =\n      recipes.length + '件（' + summary + '）';\n    render();\n  };\n  reader.readAsText(file, 'UTF-8');\n}\n\n/* ----- Priority Ingredients ----- */\n\nfunction renderPriorityTags() {\n  const container = document.getElementById('priority-tags');\n  container.innerHTML = '';\n  priorities.forEach((tag, idx) => {\n    const span = document.createElement('span');\n    span.className = 'pri-tag';\n\n    const text = document.createTextNode(tag + ' ');\n    span.appendChild(text);\n\n    const btn = document.createElement('button');\n    btn.textContent = '✕';\n    btn.addEventListener('click', () => removePriority(idx));\n    span.appendChild(btn);\n\n    container.appendChild(span);\n  });\n}\n\nfunction handlePriorityKey(e) {\n  if (e.key === 'Enter' && e.target.value.trim()) {\n    priorities.push(e.target.value.trim());\n    e.target.value = '';\n    Storage.set('prio', priorities);\n    renderPriorityTags();\n  }\n}\n\nfunction removePriority(idx) {\n  priorities.splice(idx, 1);\n  Storage.set('prio', priorities);\n  renderPriorityTags();\n}\n\n/* ----- Actions ----- */\n\nfunction addDays(numDays) {\n  if (!numDays) numDays = 7;\n  if (!recipes.length) { alert('CSVをインポートしてください'); return; }\n  const start = entries.length\n    ? addDaysToISO(entries[entries.length - 1].date, 1)\n    : todayISO();\n  const defaultBF = breakfastPatterns.length ? breakfastPatterns[0].name : null;\n  for (let i = 0; i < numDays; i++) {\n    entries.push({\n      date: addDaysToISO(start, i),\n      dinner: null,\n      breakfast: defaultBF,\n      status: 'draft',\n      skipped: false\n    });\n  }\n  saveEntries();\n  render();\n  setTimeout(() => {\n    const tl = document.getElementById('timeline');\n    if (tl.lastElementChild) {\n      tl.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'center' });\n    }\n  }, 100);\n}\n\nfunction lotteryDrafts() {\n  if (!recipes.length) return;\n  const targets = [];\n  entries.forEach((entry, idx) => {\n    if (entry.status === 'draft' && !entry.skipped && !entry.locked) {\n      const dayName = getDayName(entry.date);\n      const rule = getRuleForDay(dayName);\n      const count = filterByRule(recipes, rule).length;\n      targets.push({ idx, count });\n    }\n  });\n  if (!targets.length) return;\n  targets.sort((a, b) => a.count - b.count);\n  // Clear before redraw so duplicate avoidance sees fresh state\n  for (const target of targets) {\n    entries[target.idx].dinner = null;\n  }\n  for (const target of targets) {\n    const result = drawForEntry(target.idx);\n    if (result) entries[target.idx].dinner = result;\n  }\n  saveEntries();\n  render();\n}\n\nfunction confirmDrafts() {\n  const hasContent = entries.some(e =>\n    e.status === 'draft' && (e.dinner || e.breakfast)\n  );\n  if (!hasContent) return;\n  if (!confirm('入力済みの献立を確定しますか？')) return;\n\n  for (const entry of entries) {\n    if (entry.status === 'draft' && (entry.dinner || entry.breakfast)) {\n      entry.status = 'confirmed';\n    }\n  }\n  entries = entries.filter(e =>\n    !(e.status === 'draft' && !e.dinner && !e.breakfast)\n  );\n  const cutoff = addDaysToISO(todayISO(), -28);\n  entries = entries.filter(e => e.date >= cutoff || e.status === 'draft');\n  saveEntries();\n  render();\n}\n\nfunction resetAll() {\n  if (!entries.length) return;\n  if (!confirm('献立をすべてクリアしますか？\\n（レシピCSVと朝食パターンはそのまま残ります）')) return;\n  entries = [];\n  saveEntries();\n  render();\n}\n\n/* ----- Per-entry actions ----- */\n\nfunction toggleSkip(idx) {\n  if (entries[idx].status !== 'draft') return;\n  entries[idx].skipped = !entries[idx].skipped;\n  if (entries[idx].skipped) { entries[idx].dinner = null; entries[idx].locked = false; }\n  saveEntries();\n  render();\n}\n\nfunction toggleLock(idx) {\n  if (entries[idx].status !== 'draft' || entries[idx].skipped) return;\n  entries[idx].locked = !entries[idx].locked;\n  saveEntries();\n  render();\n}\n\nfunction toggleDayMenu(event, idx) {\n  event.stopPropagation();\n  const menu = document.getElementById('day-menu-' + idx);\n  if (!menu) return;\n  const isOpen = menu.classList.contains('open');\n  // close any other open menus\n  document.querySelectorAll('.day-menu.open').forEach(m => m.classList.remove('open'));\n  if (!isOpen) menu.classList.add('open');\n}\n\nfunction closeDayMenu(idx) {\n  const menu = document.getElementById('day-menu-' + idx);\n  if (menu) menu.classList.remove('open');\n}\n\ndocument.addEventListener('click', (e) => {\n  if (e.target.closest('.day-menu-wrap')) return;\n  document.querySelectorAll('.day-menu.open').forEach(m => m.classList.remove('open'));\n});\n\nfunction redrawEntry(idx) {\n  if (entries[idx].status !== 'draft' || entries[idx].skipped) return;\n  const result = drawForEntry(idx);\n  if (result) entries[idx].dinner = result;\n  saveEntries();\n  render();\n}\n\nfunction clearDinner(idx) {\n  if (entries[idx].status !== 'draft') return;\n  entries[idx].dinner = null;\n  saveEntries();\n  render();\n}\n\nfunction toggleEditDinner(idx) {\n  const el = document.getElementById('edit-' + idx);\n  el.style.display = el.style.display === 'block' ? 'none' : 'block';\n}\n\nfunction cancelEdit(idx) {\n  document.getElementById('edit-' + idx).style.display = 'none';\n}\n\nfunction saveEdit(idx) {\n  const textarea = document.getElementById('edit-ta-' + idx);\n  const lines = textarea.value.split('\\n').filter(l => l.trim());\n  if (!lines.length) {\n    entries[idx].dinner = null;\n  } else {\n    if (!entries[idx].dinner) {\n      entries[idx].dinner = {\n        name: '', sides: '', ingredients: '', book: '', page: '', category: ''\n      };\n    }\n    entries[idx].dinner.name = lines[0];\n    entries[idx].dinner.sides = lines.slice(1).join('　') || '';\n  }\n  saveEntries();\n  render();\n}\n\nfunction setBreakfast(idx, value) {\n  entries[idx].breakfast = value || null;\n  saveEntries();\n}\n\nfunction deleteEntry(idx) {\n  const label = entries[idx].dinner\n    ? entries[idx].dinner.name + 'を削除しますか？'\n    : 'この行を削除しますか？';\n  if (!confirm(label)) return;\n  entries.splice(idx, 1);\n  saveEntries();\n  render();\n}\n\n/* ============================================================\n   RENDER\n   ============================================================ */\n\nfunction render() {\n  const tl = document.getElementById('timeline');\n\n  if (!recipes.length) {\n    tl.innerHTML = '<div class=\"tl-empty\">レシピCSVをインポートしてください<\u002Fdiv>';\n    return;\n  }\n  if (!entries.length) {\n    tl.innerHTML = '<div class=\"tl-empty\">「＋7日分追加」で献立欄を作成<\u002Fdiv>';\n    return;\n  }\n\n  tl.innerHTML = '';\n  entries.forEach((entry, idx) => {\n    const dayName = getDayName(entry.date);\n    const isConfirmed = entry.status === 'confirmed';\n    const isSkipped = entry.skipped;\n    const isLocked = entry.locked && !isConfirmed && !isSkipped;\n\n    const row = document.createElement('div');\n    row.className = 'day-row' +\n      (isConfirmed ? ' confirmed' : '') +\n      (isSkipped ? ' skipped' : '') +\n      (isLocked ? ' locked' : '');\n\n    // --- Left side: dinner ---\n    const left = document.createElement('div');\n    left.className = 'day-left';\n\n    const rule = getRuleForDay(dayName);\n    const categoryLabel = entry.dinner\n      ? (rule.type === 'tag' ? rule.value : entry.dinner.category)\n      : rule.value;\n\n    let html = '<div class=\"day-header\">' +\n      '<span class=\"day-name\">' +\n      '<span class=\"day-date\">' + escapeHTML(formatDate(entry.date)) + '<\u002Fspan>' +\n      escapeHTML(getDayNameEN(entry.date)) +\n      '<\u002Fspan>' +\n      '<span class=\"day-cat\">' + escapeHTML(categoryLabel) + '<\u002Fspan>' +\n      '<\u002Fdiv>';\n\n    if (isSkipped) {\n      html += '<div class=\"day-main\"><span class=\"day-main-text\">— スキップ<\u002Fspan><\u002Fdiv>';\n      if (!isConfirmed) {\n        html += '<div class=\"day-actions\">' +\n          '<button onclick=\"toggleSkip(' + idx + ')\">スキップ解除<\u002Fbutton>' +\n          '<button onclick=\"deleteEntry(' + idx + ')\">削除<\u002Fbutton>' +\n          '<\u002Fdiv>';\n      }\n    } else if (entry.dinner) {\n      const mainText = entry.dinner.name;\n      const sidesText = entry.dinner.sides || '';\n      const lockLabel = isLocked ? 'ロック解除' : 'ロック';\n\n      html += '<div class=\"day-main\">' +\n        '<span class=\"day-main-text\">' + escapeHTML(mainText) + '<\u002Fspan>';\n      if (!isConfirmed) {\n        html += '<span class=\"day-inline-actions\">' +\n          '<button class=\"day-btn redraw\" onclick=\"redrawEntry(' + idx + ')\" aria-label=\"再抽選\" title=\"再抽選\">↻<\u002Fbutton>' +\n          '<button class=\"day-btn\" onclick=\"toggleEditDinner(' + idx + ')\">編集<\u002Fbutton>' +\n          '<button class=\"day-btn\" onclick=\"clearDinner(' + idx + ')\">クリア<\u002Fbutton>' +\n          '<button class=\"day-btn\" onclick=\"toggleLock(' + idx + ')\">' + lockLabel + '<\u002Fbutton>' +\n          '<button class=\"day-btn\" onclick=\"toggleSkip(' + idx + ')\">スキップ<\u002Fbutton>' +\n          '<button class=\"day-btn danger\" onclick=\"deleteEntry(' + idx + ')\">削除<\u002Fbutton>' +\n          '<\u002Fspan>';\n      }\n      html += '<\u002Fdiv>';\n      if (sidesText) {\n        html += '<div class=\"day-sides\">' + escapeHTML(sidesText) + '<\u002Fdiv>';\n      }\n      if (entry.dinner.ingredients) {\n        html += '<details class=\"ing-toggle\" open><summary>材料<\u002Fsummary>' +\n          '<div class=\"ing-content\">' + escapeHTML(entry.dinner.ingredients) + '<\u002Fdiv>';\n        if (entry.dinner.book) {\n          html += '<div class=\"ing-ref\">' + escapeHTML(entry.dinner.book) +\n            (entry.dinner.page ? ' p.' + escapeHTML(entry.dinner.page) : '') +\n            '<\u002Fdiv>';\n        }\n        html += '<\u002Fdetails>';\n      }\n      if (!isConfirmed) {\n        html += '<div class=\"day-edit\" id=\"edit-' + idx + '\">' +\n          '<textarea id=\"edit-ta-' + idx + '\"><\u002Ftextarea>' +\n          '<div class=\"day-edit-actions\">' +\n          '<button onclick=\"cancelEdit(' + idx + ')\">キャンセル<\u002Fbutton>' +\n          '<button class=\"save-btn\" onclick=\"saveEdit(' + idx + ')\">保存<\u002Fbutton>' +\n          '<\u002Fdiv><\u002Fdiv>';\n      }\n    } else {\n      html += '<div class=\"day-main\">' +\n        '<span class=\"day-main-text\" style=\"color:var(--text-faint)\">—<\u002Fspan>';\n      if (!isConfirmed) {\n        html += '<span class=\"day-inline-actions\">' +\n          '<button class=\"day-btn redraw\" onclick=\"redrawEntry(' + idx + ')\" aria-label=\"抽選\" title=\"抽選\">↻<\u002Fbutton>' +\n          '<button class=\"day-btn\" onclick=\"toggleEditDinner(' + idx + ')\">手入力<\u002Fbutton>' +\n          '<button class=\"day-btn\" onclick=\"toggleSkip(' + idx + ')\">スキップ<\u002Fbutton>' +\n          '<button class=\"day-btn danger\" onclick=\"deleteEntry(' + idx + ')\">削除<\u002Fbutton>' +\n          '<\u002Fspan>';\n      }\n      html += '<\u002Fdiv>';\n      if (!isConfirmed) {\n        html += '<div class=\"day-edit\" id=\"edit-' + idx + '\">' +\n          '<textarea id=\"edit-ta-' + idx + '\"><\u002Ftextarea>' +\n          '<div class=\"day-edit-actions\">' +\n          '<button onclick=\"cancelEdit(' + idx + ')\">キャンセル<\u002Fbutton>' +\n          '<button class=\"save-btn\" onclick=\"saveEdit(' + idx + ')\">保存<\u002Fbutton>' +\n          '<\u002Fdiv><\u002Fdiv>';\n      }\n    }\n\n    if (isConfirmed) {\n      html += '<div class=\"day-actions\">' +\n        '<button onclick=\"deleteEntry(' + idx + ')\">削除<\u002Fbutton>' +\n        '<\u002Fdiv>';\n    }\n\n    left.innerHTML = html;\n\n    // Set textarea value via DOM (not innerHTML) to avoid entity issues\n    if (!isConfirmed && entry.dinner) {\n      const ta = left.querySelector('#edit-ta-' + idx);\n      if (ta) {\n        ta.value = entry.dinner.name +\n          (entry.dinner.sides ? '\\n' + entry.dinner.sides : '');\n      }\n    }\n\n    // --- Right side: breakfast ---\n    const right = document.createElement('div');\n    right.className = 'day-bf';\n\n    if (isConfirmed) {\n      const bfLabel = document.createElement('div');\n      bfLabel.className = 'day-bf-label';\n      bfLabel.textContent = '朝';\n      right.appendChild(bfLabel);\n\n      const bfText = document.createElement('div');\n      bfText.className = 'day-bf-text';\n      bfText.textContent = entry.breakfast || '—';\n      right.appendChild(bfText);\n    } else {\n      const bfLabel = document.createElement('div');\n      bfLabel.className = 'day-bf-label';\n      bfLabel.textContent = '朝';\n      right.appendChild(bfLabel);\n\n      const select = document.createElement('select');\n      select.addEventListener('change', function() { setBreakfast(idx, this.value); });\n\n      const emptyOpt = document.createElement('option');\n      emptyOpt.value = '';\n      emptyOpt.textContent = '—';\n      select.appendChild(emptyOpt);\n\n      breakfastPatterns.forEach(p => {\n        const opt = document.createElement('option');\n        opt.value = p.name;\n        opt.textContent = p.name;\n        if (entry.breakfast === p.name) opt.selected = true;\n        select.appendChild(opt);\n      });\n\n      if (entry.breakfast && !breakfastPatterns.some(p => p.name === entry.breakfast)) {\n        const opt = document.createElement('option');\n        opt.value = entry.breakfast;\n        opt.textContent = entry.breakfast;\n        opt.selected = true;\n        select.appendChild(opt);\n      }\n\n      right.appendChild(select);\n    }\n\n    row.appendChild(left);\n    row.appendChild(right);\n    tl.appendChild(row);\n  });\n}\n\n/* ============================================================\n   SHOPPING LIST\n   ============================================================ */\n\nfunction findBreakfastIngredients(name) {\n  if (!name) return '';\n  const pattern = breakfastPatterns.find(p => p.name === name);\n  return pattern && pattern.ingredients ? pattern.ingredients : '';\n}\n\nfunction openShoppingList() {\n  const body = document.getElementById('shop-body');\n  const items = [];\n\n  function collectItems(filter) {\n    entries.forEach(entry => {\n      if (!filter(entry)) return;\n      const parts = [];\n      if (entry.dinner && entry.dinner.ingredients) {\n        parts.push(entry.dinner.ingredients);\n      }\n      const bfIng = findBreakfastIngredients(entry.breakfast);\n      if (bfIng) parts.push('【朝】' + bfIng);\n      if (parts.length) {\n        items.push({\n          label: getDayName(entry.date) + ' ' + formatDate(entry.date),\n          text: parts.join('\\n')\n        });\n      }\n    });\n  }\n\n  collectItems(e => e.status === 'draft' && (e.dinner || e.breakfast));\n  if (!items.length) {\n    collectItems(e => e.dinner || e.breakfast);\n  }\n\n  if (items.length) {\n    body.innerHTML = '';\n    items.forEach(item => {\n      const div = document.createElement('div');\n      div.className = 'shop-day';\n\n      const h3 = document.createElement('h3');\n      h3.textContent = item.label;\n      div.appendChild(h3);\n\n      const pre = document.createElement('pre');\n      pre.textContent = item.text;\n      div.appendChild(pre);\n\n      body.appendChild(div);\n    });\n  } else {\n    body.innerHTML = '<div style=\"color:var(--text-faint);font-size:13px\">献立を作成してください<\u002Fdiv>';\n  }\n\n  document.getElementById('shop-overlay').classList.add('open');\n  document.body.style.overflow = 'hidden';\n}\n\nfunction closeShoppingList(e) {\n  if (e && e.target !== document.getElementById('shop-overlay')) return;\n  document.getElementById('shop-overlay').classList.remove('open');\n  document.body.style.overflow = '';\n}\n\n/* ============================================================\n   INIT\n   ============================================================ */\n\nrenderRules();\nrenderBreakfastPatterns();\nrenderPriorityTags();\nrender();\n\nif (recipes.length) {\n  document.getElementById('csv-status').textContent = recipes.length + '件読み込み済';\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
